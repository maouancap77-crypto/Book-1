(function() {

    const TEXTO_ORIGINAL = `



Canto Desconhecido – Gemini Tigres.











Certa vez, em um remoto e campônio condado, d’além das colinas Draculeanas e dos campos Evergrenianos, regiam dois jovens esposos. Ele, mal saído da corte do Sire de Saint-Serrie, onde servira como pajem. Ela, por sua vez, a segunda filha de um opulento barão portuário.
O dote que a conduzira àquele solo não fora fastuoso, e o feudo, por mais que ostentasse torres altaneiras, bastiões vetustos e muralhas que sussurravam ecos das guerras de unificação do reino de Zephyros, principado vizinho a Argonia, subsistia mormente de campos e vilas agrícolas.
Mas eis que, entre essas paragens modestas, florescia um amor digno dos trovadores: felizes, embalados pela paixão e ardor dos amantes, desfrutaram de magníficas primaveras e verões, e sua juventude ressoava como harpa tocada pelos dedos do próprio destino. A condessa, sempre exuberante de bochechas rosadas e cabeleira ruiva rebelde, enquanto o esposo, sempre altivo e ereto, orgulhoso qual galgo ao lado de sua preciosíssima flor.
Amados por seu povo, o foram. Durante os invernos, recolhiam-se no palacete e envolviam-se com as danças e no calor um do outro, em perfeito e exemplar romance. Duas almas gêmeas, unidas em uma, por ELE, e veladas com grande desvelo por nós.
Nas primaveras, grandes festanças e farta alimentação eram servidas no pátio do solar ao povo, e assim tudo perfeito perfazia-se. E embora os anos fossem laboriosos, o nobre casal nunca desbotou, mantiveram sempre seus sorrisos no rosto, e sempre dispostos a ajudar aquela que era sua gente.
Mas onde há luz, também há sombra. E a inspiração deu lugar a um sentimento muito mais mesquinho... a inveja começou a serpentear nas mentes e corações daquele povo.
Os anos passavam em seu passo inexorável, a flor da idade esvaia-se de ambos. E já por volta de seus trinta verões, a condessa se aproximava, seu sorriso começava a minguar, mesmo tendo sido cumulados ao mando DELE de tantas virtudes e bênçãos.
Fácil era saber o que atormentava a mente dos já não tão jovens condes: lhes faltava continuidade... lhes faltava o selo definitivo de seu amor... aquele que eternizaria seu nome: lhes faltava o fruto deste amor.
Não foi espantoso ver os sorrisos, os cochichos e as pragas mal contidas, ocultas sob uma amarelada cordialidade, embebida em veneno mortal, nos rostos das anciãs, mesmo nas bocas das jovens segurando seus rebentos, e até seus bastardos eram exibidos sem nulo pudor. A zombaria contra aquela que se via elevada a alvo dos arqueiros das línguas fraudulentas, não foi menos injusta que numerosa.
Inveja mal dissimulada e mesquinha, ira contra o que é mais alto, contra a boa Fortuna mesmo que beneficiários da mesma. Blasfêmia odiosa, contra eles, assim como também fazem a nós. Ademais, até entre os homens nas tavernas ouviam-se piadas e canções satíricas das bocas dos bardos, sobre aquela a quem apelidaram de “Ventre Seco”.
Embora não ousassem falar abertamente na presença de seus senhores tais impropérios, faziam-nos chegar a eles indiretamente. Muitas das mulheres, em cruel sadismo, exibiam orgulhosas à condessa suas crias, fazendo até mesmo fila para apresentá-las à pobre criatura.
Pouco a pouco, sua vivacidade esmoreceu, como muralha assediada por muitos dias. O riso, outrora límpido como as águas da fonte, secou-se; os lábios, antes rosados como pêssegos, acinzentaram-se; o vigor e a pele rosada abandonaram-na, dando lugar a profundas olheiras e palidez mortiça. A senhora já não saía de seus aposentos como antes, não se ungia tampouco se vestia como outrora.
Andava qual criatura abominável pelas sombras, e por mais que seu amoroso esposo tentasse confortá-la, ela se recusava a ser consolada, bem como se recusava a ele. E, qual pustulenta infecta, o evitava. Privado de seu grande amor, o conde caiu em irritabilidade, e pouco lhe era necessário para berrar e fazer chover tinteiros sobre os servos e paredes, então enfurecido, sair a pisotear ruidosamente pelos corredores bufando qual beemote, não raras vezes arrancando as cortinas e lançando os candelabros aos chutes ao longe.
Fato é que, assim, mais e mais isolados se tornaram ambos, e isso de alguma forma suscitou certo saudosismo em seus vassalos. Mesmo aqueles que zombavam, agora se lamentavam e desejavam ao menos uma vez mais alfinetar o coração de seus senhores, ou, quem sabe vê-la sorrir outra vez, por ouvir sua voz erguer-se nas festividades primaveris.
Prantos noturnos desde o momento em que se deitava ao dealbar do dia tornaram-se rotina para a condessa, que recusava qualquer alimento apetecível e, mesmo com as lagrimas e súplicas de sua dama de companhia, obstinava-se em jejuar. Cada vez mais magra e fraca, a outrora viva e impoluta senhora se apagava.
Finalmente, conde e condessa, em seu desespero, se lembraram daqueles que vigiam do alto. Voltando cada um a seu modo às preces: um pedindo que a mulher a qual amava voltasse para seus braços, e a outra que um fim fosse posto à sua miséria, se não por um filho, que o manto escarlate da morte se estendesse sobre ela.
Com peculiar insistência neste realejo, inda dois invernos perpassaram-se, dobrando-se sobre si como pergaminhos de Cronos. E, com um pouco de nosso auxílio, a condessa enfadou-se da solidão e retornou, mesmo que apreensiva, ao convívio conjugal.
Então em oráculo proclamado em uma das raras cerimônias que o ilustre casal se fez presente na diocese condal, lhes foi anunciado:
“Quando a Leonina encarasse a Tibre nos céus do outono, após laborioso verão, duas chamas arderiam no ventre da condessa e essas chamas tornar-se-iam em um grande tigre. Esse tigre teria duas faces: uma face vermelha, ardente e inconteste, e uma segunda face branca e branda, que balancearia o ímpeto de seu outro lado. Uma será garras e boca, a outra será o coração. Elas se amarão como a mente ama o corpo: inseparáveis e interdependentes. Ninguém, seja donzela ou donzel, poderá domesticar essa fera; seu amor a eles nada fará. Apenas uma pode conter a outra e, quando o coração parar, apenas um mar de chamas arderá, com suas garras lançando-se, alcançando e despedaçando tudo quanto se atrever a plasmar-lhe a terrível simetria, até que, quando tudo consumido for, ela também se apagará em meio às cinzas.” 
Inspirados por tal augúrio, o casal entregou-se com ardor à paixão. E assim, no outono seguinte – aos trinta e três verões da condessa e aos trinta e sete do conde – o milagre se fez presente: a condessa, portadora de um dom há mui almejado, viu em seu ventre a semente da vida florescer.
O felicíssimo conde abriu novamente o palácio como há muito não se realizava. Grande banquete, enorme confraternização foi apregoada. Todos os seus vassalos e até mesmo os senhores de outras terras vieram prestar homenagens. Voltava a reinar a felicidade, e a futura mãe retornava a seu brilho, e em nada seus anos de sofrimento pareciam ter podido contra ela.
Com grande zelo, o clero e os médicos se entregaram aos cuidados da parturiente; os primeiros pela sombra das últimas linhas da profecia, os segundos pelas vastas quantias que o conde não poupava em cuidados para seus mais valiosos tesouros. Nada mais se tratava em todo o condado e circunvizinhanças senão da bem-aventurada gestação. Um ou outro muxoxo obstinado se fazia aqui ou ali, mas isso pouca importância tinha. 
O conde não conseguia passar mais de uma hora sem perguntar pelas condições da esposa e, sempre que podia, saía correndo para estar com ela. Mais esperada e velada por mortais foi esta gravidez do que a de muitos reis. A criadagem, com redobrado vigor, arrumava os preparativos para a chegada do herdeiro. E no ventre da agora belíssima e restabelecida condessa, que parecia ainda mais radiante e jovem por sua condição do que antes, efeito da alegria em maior parte, formava-se o grande tigre. Quão bem a verdadeira e virtuosa alegria faz a todos! Cumulada de carinhos, doces, castanhas e nozes açucaradas, tortas, confeitos e outras guloseimas que seu esposo garantia que chegassem a ela com a constância de uma cascata.
Trompas e clamor de trombeta acompanharam o grande festim, repetido mês a mês até que, finalmente, o tempo de dar à luz chegou. Como sugerido pelos médicos e com os efusivos pedidos do conde, no Hospital do Cálice Sagrado o parto se realizou, sob o constante apoio dos irmãos médicos, que não deixaram de infundir na futura mãe a mais alta magia de cura. Muitos caíram prostrados ao esgotarem sua mana durante o processo.
Graças a tais incumbências, o parto foi indolor e extremamente rápido, como se a natureza se esforçasse para trazer à luz aquelas duas faces.
Sim, gêmeos: um menino e uma menina vieram à luz naquele verão, como coroação à riquíssima colheita de que muito se lembrariam e que havia precedido tão trabalhoso ano ao qual a profecia se referia. Desde o início, o irmão não dava paz se o separassem da irmã, tendo assim os dois de dividir um pequeno berço. Quando tentaram separá-los, além dos infinitos e efusivos berros, ele rompeu as ataduras que o ligavam, exibindo-se de peito aberto como havia vindo ao mundo, contra aqueles que o retiravam de seu outro lado.
Ela, por sua vez, em extremo silêncio, era checada frequentemente para ver se ainda havia espírito de vida na criança. A única quebra nesse silêncio ocorria quando se revolvia furiosamente, com pequenas espezinhadas e ameaças de choro, ao ver seu irmão se afastar, mesmo que estivesse ao lado para ser amamentado. Extremamente branca, com cabelos como os do pai, loiros, mas ainda mais embranquecidos. Já o garoto exibia, desde já, vasta cabeleira ruiva como a mãe, ossos fortes e um crânio extremamente robusto. Quase quebrou o dedo de uma das amas quando está o ofereceu, e provavelmente o teria partido se não houvessem acudido a mulher.
Mas o conde e a condessa não podiam ser mais orgulhosos genitores. Ao décimo dia do nascimento, deram um ainda maior banquete que todos os anteriores, convidando toda a parentela de ambos, até os mais distantes. O conde não parecia se importar nem um pouco com dinheiro ou como pagaria os inúmeros empréstimos que tomara. Nada disso importava desde que seus 'príncipezinhos' fossem celebrados, mimados e por todos os lados afagados. A mãe não ficava fora do regozijo, com um marido efusivamente grato, acumulando-a de beijos a todo o tempo e independentemente de quem estivesse presente.
Ao menino batizaram de Bellignarior e à menina de Alfianora, os mais novos condes de Valen. Cresceram os meninos em força e formosura, nunca se desvencilhando totalmente um do outro, fortes como touros. Sempre acompanhados de perto com grande interesse pelo arcebispo da diocese de Valen, com apoio do mestre do hospital. Inúmeras foram as vezes que o conde e mesmo a condessa, enfadados de tantas atenções, acudiram aos clérigos, alegando que tais preocupações eram desnecessárias ou, no mínimo, exageradas.
No entanto, certo dia, quando os pequenos estavam em seu quarto ano natalício, foi para grande pavor das servas que encontraram o jovem conde silencioso, assentado ao lado da irmã, embebido dos pés à cabeça de sangue. A garota permanecia etérea como sempre, observando um pássaro em um galho distante.
Após muito buscarem por ferimentos no garoto, com o conde e a condessa desesperados a saltar de um lado ao outro do quarto, apertando os rostos entre as mãos, deram-se por satisfeitos ao encontrarem um ninho de Amphisbaenas, das quais todas, incluindo a mãe, encontravam-se fendidas de cabeça a cabeça.
O arcebispo acorreu a apontar o acontecimento como inequívoca manifestação da face vermelha da profecia, sendo repelido pelos pais com a afirmação orgulhosa de que - Foi apenas um irmão defendendo a irmã.
Mais alguns invernos se passaram sem maiores intercorrências. Os pequenos permaneciam silenciosos a maior parte do tempo, ladeando as saias de sua mãe, mas nunca fora da vista um do outro.
Entanto, o conde decidiu-se por levar seu herdeiro a uma caçada, iniciando assim seu herdeiro na arte venatória, não sem forte protesto do garoto, mas ainda assim partiram. Enfronharam-se com o guarda-caça e seus filhos pela floresta próxima, buscando pegar um galhardo ou quem sabe um áureo-dama. No entanto, tal empreitada rapidamente teve de ser redesignada na busca pelo garoto, que, em um salto, livrou-se em um momento de descuido do abraço do pai que o mantinha entre si e o pomo da sela do alazão. E, com uma força e agilidade descomunais, lançou-se por entre as brenhas, desaparecendo rapidamente. Embora tentassem lhe alcançar, a trupe do conde falhou em parar o pequeno.
Mais tarde, quase ao anoitecer, um dos cães encontrou algo e, com altos latidos, chamou a atenção dos servos e do conde até uma clareira cercada por arbustos. Apressando-se ao local, encontraram, para o mais absoluto espanto de todos os presentes, naquela clareira, o jovem conde a brincar com uma loba Fenrir prateada e juvenil. Ao lado de ambos, estava a pequena Alfionora, enquanto o brilho dos pelos da fera iluminava os jovens.
Um dos homens entesou o arco contra a loba, mas foi obstruído pelo pequeno, que pareceu reluzir alaranjado por um instante. Com agilidade, ele saltou à frente de suas novas e antigas amizades, protegendo-as. O conde, enfurecido, tomou o arco da mão do servo e acorreu preocupado aos filhos. Bellignarior, em um de seus raros momentos vocálicos, pronunciou:
— Meu pai, levemos ela para casa!
O conde tentou negar, mas a intensidade do pedido e o cuidado que os pequenos dedicavam à assustada loba o fizeram ceder. Afinal, seria bom que eles tivessem alguém além de si mesmos. Com um aceno, abandonou parte das preocupações e consentiu, voltando os jovens condezinhos às costas de sua nova amizade lupina.
Acharam o castelo em grande alvoroço, pois a condessa mandara que a guarda e todos quantos pudessem auxiliar buscassem pela donzela, e já saía uma patrulha pelos portões quando chegaram. Mui aliviada e com lágrimas nos olhos, a condessa acorreu, tomando os infantes em seus braços ao vê-los. Após longas repreensões e perguntas a estes, que pouco respondiam, e ao conde também, tomou ciência da loba que, na emoção, ignorara. Estupefata, com um grito, recuou, cingindo as crianças nos braços e clamando pelos guardas. O conde rapidamente a apaziguou, mas isso não impediu o que viria mais tarde.
Naquela noite, o conde pai encarou as consequências daquele aceno com um enérgico sermão da condessa, que durante três quartos de hora lhe reprendeu, horrorizada, com a nova montaria dos filhos. Mas, por fim, ao presenciar Bellignarior e Alfianora escovando a loba que lhes dava a barriga, acabou comovendo-se e consentindo com a nova residente do castelo.
Os estios se escoaram, e os mancebos floresceram cada vez mais altos, mais sábios e robustos, em dias seguidos de silente leitura na livraria, devorando tomo após tomo com tal avidez que o conde, em desespero, lhes rogou mercê pelas suas riquezas. Contristados, obedeceram ao mandado paterno, lançando-se a outras atividades. Aos doze anos, quase em uníssono, provaram o despertar mágico, o qual, para os donzéis e donzelas de quinze anos, era cousa natural, mas para os homens, um vero prodígio — não, porém para nós, que cumpríamos o que desde os primórdios fora ordenado, dia após dia.
O despertar se deu desta guisa: repousavam os gêmeos no pátio, quando a filha do bailio, com os filhos do senescal, decidiu-se por divertir-se às custas de seus futuros senhores, pregando-lhes uma peça. tramando-lhes uma troça. Clamou por socorro a Bellignarior, dizendo que uma cabrinha sua se metera numa fenda estreita que dava às foscas do castelo, sob a torre. 
Com um aceno da irmã, o jovem conde espreitou pela fresta, ouvindo o balir do animal. A filha do bailio, fingindo pranto, suplicou que tentasse alcançar a cabra pelos cornos. Ele se debruçou sobre a fenda, mas os filhos do senescal o empurraram, vindo a cair ele nas trevas, para horror de Alfianora.
Mas o espaço, antes tenebroso, de súbito se alumiou com um bafo ardente em demasia, e centelhas voaram qual fesme. Uma lufada quente, como fole de forja, irrompeu da greta, queimando as sobrancelhas dos mancebos travessos que se achegaram para mirar sua obra. 
Os balidos desesperados da cabra ressoaram, e a guarda e os servos acorreram aos gritos das crianças. Um sargento, ouvindo os relatos desconexos, estendeu a mão pela fenda, retirando-a em chamas e carne viva. A cabra silenciou-se, e apenas o fedor de carne queimada pairava no ar.
O desespero tomou a todos, e a filha do balio, com os filhos do senescal, já se lançavam pelas portas berrando que o jovem conde fora tomado por um Ifrit ou que um dragão despertara nas entranhas das muralhas. 
Em maior tributo ao pavor dos súditos aflitos, Alfianora se lançou pela fenda ardente, sumindo nas labaredas. Uma das damas gritou e desfaleceu, e os guardas se preparavam para serem dizimados. Em prantos e lamúrias, o pátio se encheu, chamando a atenção dos condes que acorreram ao tumulto.
Ao serem informados, a condessa não pôde evitar cair de joelhos, rogando a Deus por seus filhos, enquanto olhava para a fresta que já não ardia, mas permanecia intransponível a um adulto, enegrecida pelas chamas. O conde, tomando um machado do cepo, tentou derrubar a parede, ordenando que os guardas o ajudassem. Ao olharem para dentro, viram os dois condezinhos reluzindo e levitando. Ao espreitarem para dentro, viram os dois condezinhos reluzindo e alçando-se no ar. Ele, com olhos rubros e raios alaranjados, e ela, elevando-se, cingia o irmão, emanando uma aura branca e benigna. 
Maravilhados, reconheceram que as crianças haviam passado pelo despertar. Assim que conseguiram abrir a fresta o suficiente, eles saíram de lá. Mais um pouco de atenção e teriam perscrutado o vulto de um de nossos irmãos que velava pelos mancebos. 
O bispo acorreu assim que soube das novas e, de um lado ao outro na sala comunal, alertava aos condes, agora calados, sobre o sobrenatural de um despertar tão precoce e a precisão do vaticínio que prenunciara os tigres. Aconselhava que os ouvissem dali em diante, para evitar maiores tormentos, pois o fim da profecia era sombrio, não só para os gêmeos, mas para todos.
Os físicos do Hospital do Cálice Sagrado aferiram a natura mágica das crianças. Alfianora revelara afinidade com arcanismo e cura, enquanto Bellignarior ascendera ao mais fundo grau de magia aellus-ígnea. Era um guerreiro mágico puro, como diriam. O mais alto grau de poder num só elemento, neste caso, um elemento derivado. Para magos medianos, tal pureza era por vezes desvantagem, mas um puro sobrepujava todas as fraquezas que um único elemento e seu parco vernáculo mágico pudessem trazer, em força bruta e poderio.
O pai não pôde evitar de animar-se, dedicando parte das tardes a ensinar ao infante a nobre arte da esgrima e do combate montado. Enquanto isso, mandou buscar em Eldoria um mestre de magia arcana para Alfianora, e, se este pudesse ensinar algo ao mancebo que lhe fosse mais vantajoso, melhor ainda seria. De toda guisa, Bellignarior, primeiramente acanhado, entregou-se de corpo e alma à lança e à espada, manejando a pesada rudis como se leve pena fora, mas inda assim rústico. Assim se via o garoto, antes desprovido de toda técnica, crescer em golpes rápidos e sequências, já não mais se quedando na defensiva, mas mantendo-se em constante ofensiva, jamais perdendo sua brusquidão. Riam-se da tática do jovem, e seu pai o advertia do perigo de fazer do ataque sua única defesa. Alguns anos se escoaram, com escudos quebrados e inúmeros palos de peleja destroçados.
Findou-se tal em uma tarde de outono, aos catorze anos dos mancebos, contemplar-se espetacular cena. O conde, experiente, em sua armadura que mandara reforçar mais de uma vez por causa dos treinos com Bellignarior, foi lançado ao longe, com o peitoral afundado por um golpe que o infante lhe dera. A primeira reação foi de pasmo e espanto entre os presentes, mas o conde, deixando-se tomar pelo riso, acalmou os ânimos, erguendo-se e louvando o filho, enquanto fitava, descrente, o vinco que se formara no aço valeriano de sua couraça, que nem mesmo uma serpe poderia traspassar.
Mais tarde naquele mesmo dia, foi a vez do campeão do condado e boa parte da guarda desafiarem o jovem conde. Na presença do sorriso de sua irmã, de toda a criadagem e de grande parte da cidade, que se juntara para ver o espetáculo, ele derrotou sem esforço os homens de armas, os grandes caçadores e os lenhadores, a todos enviando pelos ares. 
Daquele dia em diante, o mancebo tomou as cores de Vallen em todos os torneios e feitos bélicos que o condado requeria, saindo sempre vitorioso, sob a vigilância constante da mãe e da irmã, que se turbavam por seu bem-estar. A jovem, por mais de uma vez, lançou-se à pista para acudir o irmão, quando lhe parecia estar este em grave perigo, e, em mais de uma ocasião, interrompeu os combates, atirando-se em seus mantos prateados esvoaçantes ao prélio. Algumas vezes foi carregada para fora da arena nos braços do irmão, enquanto este, a braçadas, limpava o caminho de oponentes, que se viam comiserados a beijar o solo ante golpes que pareciam inda mais pesados que outrora, não poucas vezes acompanhados de chamas infernais.
Tais cuidados provaram-se válidos quando, numa justa feroz, a lança do inimigo trespassou-lhe o elmo com estrondo, fendendo a viseira em estilhaços. Bellignarior, qual titã abatido, desabou da sela, inerte, ao solo ensanguentado da pista adversa, o clangor do aço ecoando como trovão. Alfianora, com o coração em chamas, saltou da bancada qual leoa celeste, rasgando o ar em seus mantos prateados, e acorreu ao irmão tombado. Sobre ele inclinada, evocou um feitiço curativo, as palavras sagradas do Leabhar Arcana Mutabilis ressoando em brilho arcano. Mas o cavalo do opositor, enraivecido pelo fulgor mágico, lançou-se em galope selvagem contra os dois, as patas troando como martelos de guerra, horrorizando a turba e petrificando o conde e a condessa, que viam os filhos à mercê da destruição.
Meros instantes antes do embate, com a jovem entoando o encanto em sussurros trêmulos sobre o irmão exânime, e a besta couraçada com seu cavaleiro já a um fio da lança, Bellignarior ergueu-se num salto brutal, qual fera despertada do abismo. Com mãos de ferro e veias ardendo em fogo, agarrou o pescoço do cavalo com força descomunal, torcendo-o. Num só movimento, lançou ao chão o corcel e seu ginete, o impacto esmagando a terra em nuvem de pó, enquanto o animal urrava e o cavaleiro se quebrava sob o peso da derrota. A multidão, antes silente de pavor, irrompeu em brados ensurdecedores, aplausos selvagens ecoando como tambores de guerra, reverenciando o feito titânico.
Ainda que ele não mostrasse particular afeição por tais cousas, a presença da irmã inflamava-lhe o peito de orgulho por seus feitos, e o conde, com os olhos em chamas de júbilo, não podia estar mais aprazido com tão descomunal sucessor. E assim, com intento de o guardar e honrar, mandou que lhe fosse forjada uma armadura de placas da mais alta valia, obrada em oricalco luzente nas forjas montanhosas de Mythrandia, onde os mestres ferreiros, de antiga e nobre estirpe, com seus martelos faziam soar os píncaros, para que tal cena de perigo jamais se tornasse a repetir na ventura deste cavaleiro sem par.
Alfianora em nada ficava aquém do irmão em poder, já dominando os mais altos arque-encantamentos do Leabhar Arcana Mutabilis, e em muito sobrepujava os meros clérigos e físicos, usando de seus dons para afugentar as bestas das cercanias do condado nas matas, bem como para sanar os enfermos do lugar. A condessa, vendo tal virtude, determinou levar a filha em viagem por todas as terras do condado, aonde quer que fosse necessária ajuda. Bellignarior as acompanhava, indolente, na liteira, afundando-se na gola da cota. E assim, todos aqueles súditos puderam pousar os olhos em seus descomunais sires.
Não poucos foram os que tiveram cativos os olhos e os corações pelos dois, mas, tendo suas achegas rechaçadas pelos gêmeos, Alfianora foi a mais cobiçada. Seu sorriso arrebatou não poucos corações, mas ela nada queria com eles. Não era ela mesma o coração? Que faria com os alheios?
Aos dezesseis anos, os mancebos já se mostravam altos, fortes, e nada de pueril lhes restava; eram plenos adultos, erguendo-se acima de seus antecessores. Ele, em estatura, força, musculatura e poder; a irmã, em graça, altivez e formosura, ambos partilhando igual saber intelectual, de modo que difícil seria apartar suas opiniões e conhecimentos.
A gentil e etérea musa, formosa qual santa imaculada, resplandecia em sua áurea aura, inda mais bela que sua mãe, e ardia os corações de quantos nela pousavam os olhos com admiração, amor, devoção, ódio e inveja. Todos fervilhavam em torno da jovem condessa. Mas esta estava sempre guarnecida pela presença constante do irmão, e, sempre que um pretendente, mais inflamado e desesperado, se lançava de joelhos para agarrar-lhe as caudas do vestido, era carinhosamente arremessado, com as ancas queimadas, pelas portas do paço ou aos becos do mercado, pelo irmão. Este, ao menor sinal de desagrado da irmã, acendia-se, aquentando todo o ar ao redor, e perfazia-se balista de amantes apaixonados.
Menor ventura tinham as donzelas que em vão tentavam achegar-se a ele, as quais ele ignorava com desdém. E, se insistissem em sua petulância, acabavam por ver uma grande loba a correr-lhes atrás, ao assobio do mancebo. Os condes pais mui se divertiam com tal sina dos filhos. Mas isso não estorvou que casamentos fossem negociados, e a primeira a ter seu par encontrado foi Alfianora, a quem pretendiam dar ao primogênito do Marquês de Lusdotte. 
Mantiveram as tratativas em segredo, mas fabulosas novas haviam chegado ao futuro marquês, com pinturas de Alfianora, qual santa em vitrais, que lhe roubavam as noites, a fitar o céu estrelado, sonhando com sua mui gentil noiva. Já se via casado ao lado de sua marquesa, com uma hoste de belos infantes louros, tão alvos quanto a mãe, e uma santa da cura a seu lado todas as noites.
Chegando o tempo de os pretendentes se conhecerem, para que o consórcio pudesse firmar-se e as partes verem não serem logradas, já muito se falava. E os únicos alheios a tudo eram os gêmeos. Alfianora foi chamada sós pelos pais, deixando o irmão à porta, e, informada de seu destino, tentou protestar. Disseram-lhe, porém: — Já está quase feito, e o jovem marquês é homem de feitos e renome, além de galante e formoso. Já o viste em um dos torneios em que teu irmão pelejou. Deveras te achar grata por te encontrarmos tão gentil par.
Não que ela se recordasse de tal figura, mas a ideia lhe parecia absurda. Manteve a recusa, mas foi-lhe ordenado que aparelhasse a partida, quisesse ou não. Resignando-se aos desígnios dos pais, lançou-se, com lágrimas nos olhos, pelo corredor até seu aposento, ignorando as questões do irmão. Este, após lançar um olhar zeloso e ardente aos pais dentro da sala, correu no encalço da jovem, desatinado.
Ela trancou-se em seu quarto com a loba, lançando-se ao leito e cobrindo a boca com um dos travesseiros, soltando um berro abafado, inaudível a quase todos, mas não ao irmão. Este sentiu aquele grito sair-lhe da própria alma e, num rompante, ardeu tal qual na fenda, consumindo a porta, as janelas e as tapeçarias, reduzindo a pó as paredes e o chão. Coroou tal feito com um rugido que ressoou por toda a paragem, levando muitos a buscarem nos céus um wivern ou dragão.
Assentando-se ao lado da mui gentil irmã, quedaram-se ali, silentes, um ao outro juntos, como era seu costume, por longo tempo fitando o portal onde outrora se erguera a porta, ora desfeita e inexistente. Enquanto um ou outro servo, com ousadia, se aventurava a espreitar pelo corredor.
— Cavalguemos, minha mui nobre irmã — sugeriu ele, com voz firme e coração ardente. E assim, ambos partiram em mui gentil galope, montados no grande cavalo negro, de lustrosa crina, que lhe servia de montaria. Deste modo, os condes, das altas muralhas, os viram sumir no horizonte. O pai, contristado, sentiu o peito apertado, mas a condessa, firme qual rocha, não se dobrava. Haveriam de ter uma vida leda e honrada, livre de um destino macabro e vil; e, ainda assim, ela sabia em seu coração que tornariam, pois tal era a sina dos gentis filhos.
Cavalgaram juntos por quase um dia, atravessando campos verdejantes, detendo-se em algumas fortificações antigas, de pedra carcomida pelo tempo, e seguindo sua jornada, passando incontestes por vilas e burgos. Não davam tento a quem quer que lhes saísse ao encontro, acelerando o trote com gentil destreza sempre que alguém ousasse acompanhar-lhes os passos. Prática que se tornou rotineira aos dois a partir daquele dia, saindo em muitas longas cavalgadas pelos campos juntos, parando aqui ou ali, sentindo o cheiro de um campo de ervilhas selvagens ou admirando os campos de trigo e seus altaneiros moinhos.
Tornando ao castelo ao crepúsculo, naquela noite o conde não pôde encontrar repouso. De seu leito ouvia o crepitar de chamas, como se na floresta vizinha ardessem, e, levantando-se, foi à janela. Nada viu. Tornou a deitar-se, mas às lufadas ardentes que lhe chegavam aos ouvidos somaram-se os gritos espavoridos das bestas. Estupefacto, chamou o mordomo e saiu às muralhas, passando pelos sentinelas sonolentos, que, assustados, viram seu senhor, tão tarde, com candeia em mão a vagar por ali. Nada enxergou. Interrogado pela condessa sobre tais saídas, respondeu que um mal pressentimento o afligia. Acariciando-lhe o ombro, ela deu-se por satisfeita e, volvendo-se ao lado, tornou a dormir. Mas o conde velou a noite inteira.
Na mesma noite, o Arcebispo de Vallen despertou, revolvendo-se em suores frios, pois um horrível sonho o acometera. Ordenou que paramentassem sua comitiva e partiu ao castelo condal, desejando lá chegar ao romper da alva. No pátio, encontrou o pároco local que, aflito, após saudar sua graça, lhe contou que, durante suas orações noturnas, tivera visão terrífica de chamas enfurecidas. O Arcebispo, inda mais alarmado, subiu a ter com o conde, que se achava perturbado em seu scriptorium, e narrou-lhe o sonho medonho em que vira:
— Um vasto mar de fogo se lançava da cidade aos bosques, alongando-se pelo vento ao norte, ao oeste e ao sudeste, deixando uma negra chaga por toda a terra.
Ouviram também as visões tumultuadas do pároco, e o conde, então, revelou suas experiências noturnas, dizendo que, até poucos instantes, escutara o crepitar da lenha. Detiveram-se assim os homens em conciliábulo por toda a manhã, buscando o sentido daquelas cousas, sabendo, em seus corações, que ao mancebo se ligavam. Foi só quando o Arcebispo inquiriu se algo de novo ocorrera que o conde mencionou o intento do casamento.
Enfurecido, o Arcebispo bradou por que tal lhe fora ocultado antes, pois claro estava que a visão daí se gerava. Ordenou que de imediato se desfizessem as tratativas e prometeu ele mesmo apaziguar o marquês. Mas advertiu, com voz grave, que nunca, como as visões mostravam, apartassem o coração dos dentes, pois, se o fizessem, só restariam chamas. O conde, já inclinado a tal, consentiu e, em breves palavras, informou à condessa, inconformada, sua resolução, apoiado pelo pároco. Quando ela tentou inquirir o porquê, ele disse:
— Se me tendes amor, confiai em mim ao menos nesta hora, e nada mais me pergunteis sobre tal matéria.
Ela, vendo-se forçada a acatar, ainda perguntou como solveriam o imbróglio com o marquês. Respondeu ele que o Arcebispo de tudo cuidaria. Entendeu então a condessa que, tendo visto cedo a comitiva episcopal com os sargentos nas cores do bispo a partir, o motivo era de grave peso para ser obedecido. Saiu dali pensativa, com o coração inquieto.
Verões se passaram, e neste tempo o Arcebispo não deixou de visitar e dedicar mui especial cuidado ao jovem, não poucas vezes lhe oferecendo que se juntasse à sua ordem, adentrando o estado eclesiástico. Buscava amansar a fero natureza do mancebo, quem sabe prepará-lo para seu doloroso fado, e assim, porventura, evitar toda a destruição. Mas essa não era ainda a hora, e a todos os rogos da Igreja Bellignarior se desvencilhou com gentil presteza. Pois convém que o destino se cumpra, ainda que por caminhos aparentemente desconexos, e assim se fará. E nós, do alto, contemplávamos tais tentativas, mas nenhum efeito teriam, por ora.
Aos dezoito, o mancebo foi convocado ao lado de seu já ancião pai às hostes do rei. Não desejava partir, mas, vendo-se constrangido a obedecer, sentiu algo espreitar-lhe, ou antes despertar, qual dragão que, após longo sono, entreabre um olho faiscante. Submeteu-se, porém, e após receber os beijos e bençãos da mãe e da irmã, lançou-se, melancólico, atrás do pai, à frente de cem couraças luzentes, trezentos besteiros de mão firme e cem arqueiros de arco tenso, que atenderam ao chamado real contra os bárbaros do leste. Estes, conluiados com os elfos escuros, de negra perfídia, incursionavam pelo reino. Achou-se sob as marcas do Marquês de Lusdotte, aquele que quase fora sogro de sua irmã, e ao lado do filho deste, seu quase cunhado. Ambos se maravilharam com o porte do cavaleiro em sua armadura negra, de penacho vermelho qual chama viva, que se apresentava como o mui afamado jovem conde de Vallen.
Desconheciam a razão do termo das tratativas, mas o Arcebispo, com presteza, apaziguara os ânimos com inúmeros louvores, ricos presentes e uma belíssima nova noiva — uma baronesa de gentil linho, da qual era padrinho. Das dores do negócio nada se guardava, e o jovem marquês já se via, ledo, pai de um gentil infante de pouco mais de um ano de vida.
A campanha correu sem maiores entreveros, pois os bárbaros se lançavam ora aqui, ora ali, e os elfos, de negra astúcia, armavam ciladas à retaguarda. Assim que os reforços acudiam, dispersavam-se qual sombras. Uma ou outra vez, alguns retardatários do inimigo foram colhidos em campo aberto pela cavalaria, ou um assalto repelido pelos besteiros de mão firme. Mas nenhuma mui gentil vitória se alcançava, e uma guerra de desgaste se travava ao longo da fronteira. As couraças luzentes começavam a tisnar-se de ferrujem, as cordas das bestas e arcos a romperem-se, e os mantimentos a minguarem.
O conselho de guerra, do qual o velho conde era mui nobre parte, determinou avançar inconteste à capital do inimigo, queimando e pilhando tudo que em seu caminho se achasse. Assim, ao romper da alva seguinte, levantaram o acampamento e partiram. Não mui longe avançaram quando depararam com verdadeira terra arrasada: nem grão, nem campo, nem celeiro fora poupado. E a cavalaria ligeira élfica, qual vento cruel, fustigava-lhes os flancos com dardos e setas.
Bellignarior, junto de uma turma de cavalaria dos mais jovens e ardentes cavaleiros, foi enviado à retaguarda. Quando os incursores inimigos se aproximaram, disparando suas flechas e dardos, alguns já iam quebrar a formação para dar-lhes combate. Mas Bellignarior, com voz de trovão, bradou que mantivessem posição. Assim, foram fustigados em manobra de bater e correr por cerca de quatro horas inteiras. Murmúrios se erguiam, e muitos, em seus corações, julgavam o jovem um louco sem senso de peleja.
Todavia, sempre que se achegavam para desafiar-lhe o mando, eram espavoridos pelas chamas que fulgiam em seu olhar, qual dragão em vigília. Por fim, num novo assalto, a cavalaria élfica tornou, mas desta vez lançou-se mui perto. Seus corcéis iam pesados e lentos, ofegando em dificuldade, e os próprios guerreiros já não manejavam suas armas com tal destreza. Neste instante, Bellignarior, volvendo-se em súbita fúria, bradou que o seguissem em ataque. Fechando a viseira, precipitou-se a todo galope contra os elfos, que tentaram seu recuo. Mas seus animais, exaustos, não podiam competir com os corcéis bem conservados dos adversários. Estes caíram sobre eles qual trovões dos céus, e mesmo os que lograram afastar-se foram perseguidos e alcançados. Quase a totalidade, em torno de cinquenta, tombou, com Bellignarior trucidando mais de uma dúzia com gentil e terrífica violência, fendendo couraças e partindo lanças em chama viva. Assim, ganhou o total e irrestrito apoio da juventude nobre que formava a tropa de cavalaria da retaguarda. 
A nova da vitória alastrou-se pelas hostes, avivando mui grandemente o ânimo baixo dos guerreiros, tanto que o rei, em sua real majestade, chamou ao conde pai que lhe trouxesse o jovem. Em pessoa, louvou-lhe os feitos com palavras altivas e nobres, erguendo-o como espelho de lealdade, brio e valentia. Mas tal louvor não mudou o fado dos escassos mantimentos, nem a vã empresa de perseguir vultos fugidios em terras estranhas, onde o reabastecimento se tornava impossível. Resolveram, pois, assentar-se numa colina que sobranceava amplas planícies, junto a um regato de águas frescas, onde bestas e tropas pudessem dessedentar-se. Ali ergueram acampamento e, em conselho, ordenaram que, por derradeira vez, patrulhas reconhecessem o raio de vinte milhas. Se o inimigo não se revelasse, desbandariam os estandartes, retornando no dia seguinte imediato a Zephyros. 
O conde pai juntou-se aos batedores, seguido de Bellignarior e alguns dos jovens cavaleiros que a ele se haviam afeiçoado. Estes viam-no como líder nato, digno de ser seguido, ainda que ele pouco cuidasse dos que o cercavam. Pelejava contra um ardor que lhe queimava o peito, e só se sentia livre quando os pensamentos voavam à mui formosa irmã. Mantinha a compostura ante o pai, cuja presença também lhe trazia Alfianora à mente, de sorte que oscilava entre o fulgor arrebatado de sua alma flamejante e as saudades doces de sua outra face.
Após meio dia de jornada, avistou-se uma pequena cidade murada do inimigo, a não mais de doze milhas ao norte do acampamento. Trouxeram-se as novas que acenderam os corações. O restante da vanguarda, volvendo de sua missão sem fruto foi informada das novas com o restante das tropas. Com o ânimo das hostes elevado pela promessa de pilhagem e, enfim, um combate vero à vista, o régio conselho, movido por tal clamor, ordenou marcha contra a posição. Deixando parte das tropas a guardar o acampamento, avançaram com a cavalaria, não mais de quinhentos cavaleiros, e cinco coortes da infantaria, alcançando a pequena cidade fortificada ao cair do entardecer.
Verificou-se, pois, que a cidade se chamava Nummus, um pequeno entreposto comercial e tributário dos bárbaros. Era ela guarnecida por um prefeito, baronete de baixa estatura, mas de coração soberbo, confiado na inexpugnabilidade de suas forças. Achava-se a vila num pequeno elevado, ao modo de motte-and-bailey, com uma única via que subia ao motte, cravejada de seteiras estreitas. Das ameias, os arqueiros fariam verdadeiro flagelo à vida dos atacantes, lançando setas como chuva mortal. A muralha findava numa alta penha, contra a qual a cidade se recostava, tornando impossível a circunvalação do lugar. Muralhas circulares, de meio metro de grossor e quatro de altura, semi-circundavam a vila. Não eram elas mui altas, nem obra de primor vaubaniano, mas demandariam tranqueiras e máquinas de cerco, das quais a hoste real carecia. Mandá-las vir de Zephyros tardaria além daquela primavera, e nem mantimentos nem fundos havia para tal empresa. Tomá-la de assalto, com cinco mil homens, seria vitória pírrica, de glória minguada e sangue copioso.
Embaixadas foram enviadas a negociar a rendição, mas de pronto o orgulhoso barão as rechaçou. Senhor de amplos estoques e grandes cisternas, e ciente de tropas aliadas não mui distantes, a quem poderia, por seu mago, chamar em auxílio, riu-se dos emissários, dizendo que só se renderia se lhe atirassem o sol em cima. Assim, o acampamento foi trazido ante a cidade, e deram início às obras de uma primeira e segunda muralha de circunvalação, segundo os preceitos da arte da guerra. Bellignarior, porém, roía-se por dentro ao perscrutar tão demorada e vã empresa, quando todo seu desejo era galopar em furor àquela que lhe enchia o peito, pesando mais que a chama ardente e venenosa que lhe queimava as entranhas em insuportável tormento.
No segundo dia, enquanto auxiliava nas construções, o jovem avistou num escarpado um caminho natural de carneiros que subia a encosta. Correu à sua tenda e ordenou ao escudeiro que o armasse. Com a touca de malha e o bacinete nas mãos, foi visto pelos jovens nobres que lhe juravam lealdade, os quais acorreram a aparelhar-se, juntando-se a ele que analisava a senda descoberta. Entenderam de pronto suas intenções. Aguardando o anoitecer, vinte deles lançaram-se à escalada, projetando-se e puxando uns aos outros, até atingir um cume sobranceiro à cidade. Bellignarior mandara seu pajem alertar o pai de sua façanha com certo atraso, ordenando que pusesse as tropas em formação ante a cidade, para que, ao abrir-lhes os portões, atacassem. E assim era seu intento primevo.
Mas, ao mirar a cidade de cima, seus olhos tornaram-se baços, e os que o seguiam sentiram o ar ferver à sua volta. Afastaram-se de súbito, enquanto ele se elevava no ar, irradiando fulgor flamejante. Brasas e relâmpagos brotavam dele, incinerando tudo que tocavam. O jovem conde já não o era: o grande tigre despertara, e os anos de jugo o haviam mergulhado numa fome desmedida. Perante os olhos horrorizados e pasmos de seus companheiros, e de toda a hoste, uma enxurrada de vento flamejante varreu a cidade, qual explosão de Vulcanus, perfazendo decúrias de dragões. Um mar infindo de chamas, cujo calor matava antes mesmo de tocar, reduziu a cinzas puras tudo que fosse humano ou natural. As forças reais recuaram, pois até as muralhas de circunvalação, erguidas com a madeira de um bosque próximo, abrasaram-se ante tal ferocidade.
Num piscar de olhos, a cidade fulgurou em inferno. A noite tornou-se em dia naquela colina. Os gritos morreram cozidos e carbonizados nas gargantas dos que ainda os puderam soltar. O oricalco da armadura de Bellignarior tomou um padrão azulado e extrusivo, tal era o calor que dele emanava. Não houvessem seus companheiros livrado-se de suas brigantinas e cotas, teriam sido cozidos vivos. Ali estava o sol que o barão pedira.
Quando o mar de chamas se aquietou e o vento ardente cessou seu rugir, um silêncio medonho caiu sobre a terra calcinada. O conde pai, que das fileiras reais tudo presenciara, quedou-se mudo, o coração trespassado por espanto e temor. Seus olhos, outrora fulgentes de orgulho, agora se enevoavam com lágrimas que não ousavam cair, pois via em seu filho não mais o jovem cavaleiro de Vallen, mas uma força além do mortal, um tigre de fogo cuja sina lhe escapava ao entendimento. Ergueu a mão ao peito, como a conter o tumulto da alma, e murmurou em voz baixa, qual prece ao vento: — Que fado é este, meu filho, que assim te consome e a todos nos lança em sombra?
Os jovens nobres que com Bellignarior escalaram o cume, livres das couraças que o calor quase fundira, olhavam-no com os rostos lívidos, entre o pasmo e a reverência. Alguns tombaram de joelhos, as mãos trêmulas, crendo ver um santo em fúria ou um demônio em carne, enquanto outros, mais ousados, erguiam os olhos ao céu, buscando sinal da parte d’Ele que explicasse tal portento. Mas nenhum ousava achegar-se, pois o ar em torno dele inda crepitava, e o oricalco azulado de sua armadura fumegava como ferro recém-saído da forja.
A hoste real, que recuara ante o incêndio, deteve-se em desordem. Os besteiros, de mãos frouxas, deixaram cair suas armas, e os arqueiros, com os arcos inertes, fitavam a cidade reduzida a cinzas com olhos esbugalhados. Um clamor surdo cresceu entre os soldados, misturado de terror e maravilha, sussurravam que um dragão encarnado se erguera entre eles. 
Poucos, além do conde e dos mancebos que o seguiram, compreenderam o que se desvelara ante os olhos terrenos. Aos homens, em sua fraqueza mortal, pareceu que um portento horrífico, qual porta do Sheol rasgada na terra, se abrira. E assim, despojados de ânimo para o saque, fugiram de tal intento, pois nada restava que mãos humanas pudessem tomar, e muitos, em seu temor cego, juravam que um feito de trevas se erguera, tornando a cidade anátema sob o juízo celeste. Boatos voaram entre as hostes, qual sussurros do vento: uns clamavam que os magos reais haviam conjurado tal ruína, outros que um dragão ancião, preso por pacto sombrio, se libertara. E assim, em confusão e pavor, as tropas se debandaram, cada qual buscando seu caminho, como ovelhas dispersas ante o trovão, fugindo daquele chão amaldiçoado. 
O pajem, que tardara mais que o necessário em cumprir a ordem de Bellignarior, correra ao conde pai antes que o fogo tudo consumisse. Ofegante, narrara a escalada e o plano dos portões, mas suas palavras morreram ante o espetáculo que se seguira. O conde, volvendo-se ao pajem, apenas acenou com a cabeça, como quem reconhece uma verdade demasiado pesada para ser dita. E, enquanto a hoste se recompunha em tumulto, ele fitava o cume onde o filho pairava, envolto em brumas ardentes, e em seu coração duelavam o amor de pai e o temor de um senhor ante o destino que se desvelava.
Nós, que das alturas tudo miramos, vimos os bárbaros, em suas terras distantes, contemplar a destruição com olhos esbugalhados de horror. Aterrorizados, enfrondaram-se mais fundo em seus bosques escuros, e por graça divina, ou temor do que não entendiam, deixaram as fronteiras em paz por longas décadas. 
Ao voltarem, ignorando as questões do pai, Bellignarior não lhe deu resposta, e o conde, não querendo forçar o filho, quedou-se taciturno por todo o caminho. O jovem, porém, a cada passo se mostrava mais ledo e satisfeito. Seu sorriso alargava-se a cada vila que cruzavam no retorno a Vallen, e, ao avistarem o torreão do castelo, esporeou seu corcel, lançando-se à frente do pai e sua companhia. Alcançando os portões, causou grande algazarra com sua volta. Encontrou a mui formosa irmã já no pátio à sua espera, pois ela, em seu coração, pressentira cada passo que ele dera rumo a Vallen.
Num salto, lançou-se a ela, tomando-a nos braços e, erguendo-a, rodopiou, entrando no paço entre risos, contando e inquirindo as últimas novas, pouco cuidando do que se passara em Nummus. Aos olhos do conde, taciturno e apreensivo, tal visão afugentou os terrores que nutria pelo filho. Vendo-o em tão grande ledice ao lado da irmã, prometeu a si e à condessa que nunca mais o deixariam partir à guerra. A condessa, de pronto, compreendeu que algo mui grave se passara, mas quedou-se silente, apoiando o marido, cujo semblante, ainda que tentasse ocultar, traía perturbação. Soube do ocorrido ao ouvir as novas e sussurros que os veteranos da “hoste enxameada” espalhavam entre o povo e os servos. Não pôde evitar que a aflição lhe tomasse o coração de igual modo. Já não eram jovens, e temiam pelo fado dos dois quando eles, deixando este mundo terreno, viessem ter conosco nas alturas, deixando os jovens a própria Fortuna. 
A peste veio, qual sombra negra sobre a terra, e Alfianora, em sua mui formosa virtude, entregou-se por inteiro à cura dos enfermos, ombro a ombro com os irmãos do Hospital. Não foram poucos os que, por suas mãos, escaparam ao abraço da morte, e mesmo os condes pais, tomados pelo mal, foram por ela salvos. Os gêmeos prosseguiam incontestes a qualquer enfermidade, e a morte, em verdade, parecia fugir-lhes os passos. Nós, os ladeávamos em todo esse tempo, sabíamos que sua hora não era chegada, pois assim o decretara nosso Pai nas tábuas do eterno.
Mas a jovem, ainda que dotada de um poder mágico quasi sem fim, vergou-se ao peso de sua entrega. Num dos corredores da igreja, que em hospital se tornara, seus passos fraquejaram. O fulgor de sua aura, outrora qual estrela em chama, minguou-se em fios trêmulos. Suas mãos, que tantas vidas tocaram, tremeram e caíram inertes, e seus olhos, claros como o céu da alva, cerraram-se em sombra. A mana, essência de seu espírito, esgotara-se, e seu corpo, qual vaso de alabastro fino, começou a ruir em implosão silenciosa. Sem a chama vital que a sustentava, a vida lhe escapava, pois o mago que se esvazia de energia perde o sopro que o mantém unido à carne — e ela, em sua dádiva, dera tudo. Tombou ao chão, não com estrondo, mas com a leveza de uma pétala que o vento larga, pálida além da mais pura cerâmica, os lábios entreabertos num suspiro que não findava.
Foi então que Bellignarior a encontrou. Seu grito, alto e feral, rasgou o ar, qual lobo que vê sua prole perecer. Sentia o tecido de sua alma, fino e sagrado, ser forçado dentro de si, prestes a romper-se em farrapos, como se mãos profanas, cruéis e invisíveis, o furtassem em roubo sacrílego. 
Apertou-a contra o peito, onde o coração trovejava em pavor e dor, e seus olhos, ardentes de chama, marejaram-se com lágrimas que não ousava verter. — Não te percas de mim! — bradou, a voz quebrada, como quem implora ao céu que lhe devolva o que lhe é mais caro. Sentia-a esvair-se, fria e frágil, e o vazio que dela emanava era um punhal em sua alma. Sabia o risco: sem mana, o espírito dela se dissiparia, qual cinza ao vento, deixando apenas a casca mortal.
Num rugido que fez tremer as vigas da igreja, ele abriu-se à sua própria essência. Ergueu-a contra si, e de seu peito brotou um fulgor rubro, qual lava que jorra da terra fendida. Com força bruta e amor desmedido, infundiu-lhe sua mana, não como dádiva suave, mas como torrente selvagem. O ar crepitou, e relâmpagos dançaram entre eles, enquanto brasas saltavam de seu peito trespassando o linho da camisa. Era sangue de fogo que vertia dele, misturando-se à água mansa que nela restava, qual rio que se une ao mar. A palidez de Alfianora cedeu, e um leve rubor, tirado da chama viva do irmão, subiu-lhe às faces. Seus olhos, antes apagados, tornaram a brilhar, e o coração, que quase silenciara, pulsou de novo, forte e firme contra o peito dele, que ressoava suas batidas como um tambor em resposta. 
Com ela nos braços, levou-a para casa no lombo do cavalo, o passo firme, mas o olhar doce. Alfianora, volvendo à vida, sorriu-lhe com ternura e agradeceu em voz débil. Ele, com semblante benevolente, repreendeu-a duramente por suas ações impensadas. Mas findou por cingi-la em apertado abraço por todo o caminho, sentindo o pulsar dela contra seu peito, que batia em harmonia.
Os anos se escoaram, e entre torneios aqui e justas ali, os gêmeos exacerbavam beleza e vigor, sempre juntos, um ao lado do outro, como duas chamas que ardem em uníssono. Ignoravam os olhares cobiçosos e os beijos lançados por pretendentes, causando admiração e espanto entre os homens. Mas boatos malévolos, nascidos de inveja mesquinha e corações corrompidos, sussurravam sobre eles. Dizia-se, em vozes torpes, que tal vínculo talvez não fosse tão puro. Nós, que das alturas tudo miramos, víamos a falsidade dessas línguas venenosas, que falavam do que lhes era próprio, não do que era verdadeiro. Os gêmeos, porém, em nada se deixavam turbar por tais críticas; em verdade, nem se dignavam ouvi-las, pois sua união, tecida na alma, estava além do alcance de tão vil murmúrio.
O velho conde, já curvado pelos anos, não mais podia cumprir seus deveres para com a coroa, e convinha que seu herdeiro, aos vinte e um anos, tomasse os encargos que lhe pertenciam. Contra a vontade do pai e a sua própria, Bellignarior viu-se forçado a atender ao chamado do rei contra uma assembleia de barões rebeldes, que, em traição, se aliavam aos inimigos do reino dalém-mar. Por todos os meios buscou escusar-se, e até o Arcebispo intercedeu por ele junto ao rei. Mas os jovens que outrora com ele combateram deram testemunho tão assombroso aos seus pais — sendo um deles o filho do Duque, irmão de Sua Majestade — que, sob o peso de lesa-majestade e alta traição, Bellignarior, ranzinza e de coração apertado, viu-se obrigado a abandonar o castelo. À frente de suas tropas, partiu, guardando apenas com um gesto ao peito o beijo que a mui formosa irmã, marejada de lágrimas, lhe atirara. Os velhos condes, igualmente desfeitos em pranto, erguiam preces ao Todo-Poderoso pelo filho e por quantos cruzassem seu caminho. Mas convinha que os inimigos fossem expurgados, e a Fortuna deles já fora lançada. O tigre, mais uma vez, seria nossa lâmina faminta, pois assim o decretara o alto desígnio.
Tomado por mal humor e enfadonha tristeza em seu coração, o cavaleiro negro, com seu penacho carmim a flamejar qual chama viva, lançou-se sobre seu alazão. Perdeu-se de vista com a tropa para os que o miravam das muralhas, mas a cada milha percorrida sentia ele sua cara metade ausentar-se de si, qual fio de luz que se esgarça em sua alma. Ansiava por volver atrás, mas a dor, ainda que aguda, não era tão lancinante como na campanha contra os bárbaros e elfos. Desta vez, a chama em seu peito, qual voz de velho conhecido a ronronar, não o dilacerava; o olho que jamais se fechara, mas se mantivera entreaberto, tornou a fulgurar, ardente e faminto.
A cada novo campo coberto por cevada e trigo, onde moinhos distantes giravam suas pás e campônios, em seus afazeres, saudavam sorridentes seu senhor, crianças amontoavam-se para ver a tropa passar. Os que se perfilavam em orgulho pátrio erguiam suas vozes ao amo que os guiava. Mas súbito, a fumaça de Nummus, qual espectro sombrio, cobriu-lhe as faces. Num piscar de olhos, trevas de noite densa caíram sobre ele. Os campos ardiam em crepitar estrondoso, as casas e moinhos desfaziam-se em chamas vorazes, e suas pás enxameadas, qual aves feridas, despencavam com os telhados em ruína. Gritos e lamentações erguiam-se ao firmamento, clamando em vão contra o fogo que tudo devorava. Cambaleou seu pescoço sobre o cavalo, enebriado pelo gosto acre de sangue e carne queimada que lhe invadiu os sentidos, qual vinho quente que lhe subia à garganta. Ao fundo, mui distante, tremeluzia uma pequena luz — mas o fogo, vasto e cruel, era mui maior.
Foi arrancado de seu transe por um dos sargentos, ao alcançarem o ponto de encontro das tropas, já avistando o acampamento das forças reais a não mais que um tiro de onagro. E assim, o cavaleiro negro volvendo à terra, ergueu os olhos, ainda turvados pela visão das chamas que o habitavam.
A campanha foi breve, mas cheia de tormentas. Era o tempo das chuvas, e a cavalaria se afundava na lama espessa, as armaduras tornadas pesadas e encharcadas, as cordas de arcos, bestas e balistas fendidas e inúteis, rangendo cada juntura em queixa amarga. Todos se molhavam até os ossos, mas desta vez os intentos eram claros: alvos certos, posições precisas dos inimigos, cidades a tomar, sem as demoras de grandes fortalezas. Seguiram-se vitórias rápidas, qual trovão que rasga o céu, e inúmeros vilarejos caíram sob o assalto de tropas enfurecidas. Pilhagem, sequestro, morte e rapinagem alastraram-se como pragas, cenas vis a que todas as hostes se entregavam contra os revoltosos, em fúria cega e sem mercê.
Bellignarior lançava-se à matança com eficiência inaudita, qual lâmina forjada no fogo celeste, ceifando vidas com mão firme e sem hesitação. Seus antigos companheiros jovens, outrora mancebos de sua guarda, volveram a seu comando, unindo-se a ele em lealdade forjada no sangue. Não poucos magos, em suas torres altivas, e fortificações, de pedra bruta, caíam sob seu poder. Até wiverns adestrados, feras de asas cortantes, tombaram ante o jovem, abatidos por sua fúria indomável. E assim, grande fama se ergueu em torno do cavaleiro negro valleniano, temido e reverenciado por todos. Aos amigos, era qual deus entre homens, um titã de força e chama; aos inimigos, o próprio demônio encarnado, cujos olhos fulguravam com a promessa de ruína.
Chamou mais atenção ainda de seu senhor, o rei, quando só se lançou sobre a reserva inimiga, comandada pelo barão Cedric Thorne, que encarava a guarda real e ameaçava desabar sobre o flanco desguarnecido dos lealistas. Estava à frente de considerável força, a saber, toda a reserva dos barões naquela ocasião: seiscentos e trinta das milícias locais, ao lado de vinte barões e baronetes revoltosos, com seus filhos, perfazendo não mais que trinta cavaleiros. Bellignarior, vindo a toda velocidade em sua montaria, projetou-se da sela, lançando-se sobre a fila de lanças que o aguardava. Voando por cima das cabeças dos homens num instante, atirou sua lança contra o barão Thorne com a força de um ogro. O mago pessoal do barão desviou um pouco a rota do projéctil com um escudo de aeollus, mas viu-se horrorizado antes de concluir sua conjuração: as garras metálicas de Bellignarior caíram sobre ele, a manopla envolvendo-lhe o pescoço num estalar, arrancando-lhe a traqueia. Voltando-se aos milicianos com um rugido, lançou-lhes uma parede enxameada que os fez fugir em pavor. Tornou-se então ao pobre barão Cedric, que jazia empalado pelo ombro ao solo, e, num único golpe, decapitou-o ante os olhos de seus aliados, que não puderam acudir, pois a cavalaria real, comandada pelo próprio rei, já se recuperara e vinha em auxílio de Bellignarior. Este deu a cabeça do rebelde ao rei, tornando a montar e entrando em combate, ante um rei atónito e, de alguma forma, grato. O prenuncio macabro era este sentimento de sua majestade, em tempos convinha provar das garras de seu tigre particular.
Outro notável feito se deu quando um druida, em sua floresta, deu guarida a certos revoltosos. Este mago, de poder mui grande, dominava a serena, o espírito que corre em todas as plantas, qual sopro vivo da terra. Com mão firme, regia vasta hoste de Entes, criaturas de galhos e ramos retorcidos, semelhantes a homens de madeira, e espíritos menores que lhe obedeciam. Sua cavalaria de “fadas”, seres alados e aterrorizantes, massacrava com fúria selvagem todas as tropas enviadas a caçar os foragidos, despedaçando-os em emboscadas vis entre as sombras das árvores.
Foi então que, sob ordem expressa do rei, Bellignarior foi enviado para pôr fim a tal empresa. Numa única noite, a grande floresta de Aruin, outrora altiva e frondosa, ardeu em chamas enfurecidas. O vento, qual servo de sua ira, levou o fogo de copa em copa, consumindo tudo em cinzas vorazes. O crepitar das labaredas ecoou como trovão, e as águas dos riachos secaram, sufocadas pelo calor. Até hoje, os troncos carbonizados, qual sentinelas mudas de um reino perdido, testemunham a ruína daquela selva gentil. O druida, por astúcia, escapou às chamas, mas seus hóspedes e espíritos pereceram numa só noite, tragados pelo incêndio que nada poupou.
Nós, que das alturas tudo mirávamos, víamos o tigre em sua alma rugir em fúria cega, lançando sua chama sobre a terra, enquanto o coração que o temperava jazia distante, em Vallen, embora dolorido, pulsava em saudade, e retorcendo-se por sua outra face, alheio ao fogo que ela desatara.
Bellignarior, embora pouco se importasse ou tivesse plena ciência do ocorrido, ardia em fúria cega, alheio ao mundo quando os dentes do tigre afloravam em sua alma. Não sabia quão vasto era o incêndio que desencadeava, pois a chama o consumia em selvagem inconsciência. Tornou-se, assim, o mais bem-sucedido e letal comandante de Sua Majestade, e por tal feito recebeu, com surpresa e indiferença, um acréscimo mui grande às terras do condado. Possessões dos revoltosos foram entregues a Vallen, junto a farta soma de ouro, qual galardão por mãos tão sanguinárias. O rei e o alto conselho, mais e mais, afeiçoavam-se a seu executor, vendo nele uma espada afiada contra os inimigos da coroa. Assim, tomou a cadeira que outrora pertencera a seu velho pai no conselho, mas quedava-se silente na maior parte do tempo. Nada lhe importava: ou se enebriava no sangue das batalhas, o coração pulsando em êxtase cruel, ou seus pensamentos voavam ao longe, à mui formosa irmã. Imaginava que presentes lhe traria, se ela velava por sua saúde, e se a tratavam com a reverência que lhe era devida.
Peculiar e horrenda cena se deu numa dessas incursões a vilarejos inimigos. Já esmagada a rebelião e decapitados seus principais cabeças, uma região mais ao sul, que recebera apoio dos inimigos de Sua Majestade d’além-mar, obstinou-se em permanecer rebelde. Apedrejaram os oficiais reais e, em afronta vil, enforcaram sargentos e senescais na praça pública, qual troféus de sua perfídia. Lançaram-se, pois, parte das tropas a suprimir tal lugar revoltoso: uma turba de homens brutos da infantaria, guiada por poucos cavaleiros, avançou com fúria. Seguiu-se o que há muito se via: o vilarejo foi posto em chamas, e o massacre e a pilhagem alastraram-se rua a rua, porta a porta. No meio do caos, despedaçando quem lhe cruzasse o caminho, erguia-se o temido cavaleiro negro de penacho vermelho, ele mesmo ateando fogo a boa parte da cidade, qual sombra de morte a semear ruína.
Viu-se atraído a uma casa cuja porta, arrombada, deixava escapar grande gritaria. Adentrando, encontrou quatro truões da infantaria acuando um grupo de jovens labregas, irmãs ao que parecia, com risos torpes e mãos ávidas. Recuaram ao encarar o cavaleiro, cuja figura temida os sobressaltou, mas na penumbra ousaram desafiá-lo: — Sai daqui, que nossos senhores vão se deleitar com estas coelhinhas. Talvez sobre algo para ti, se fores caçar noutra parte. Estas já têm dono.
As moças, horrorizadas, berravam aos quatro ventos, os olhos saltados de temor, seus gritos ecoando qual súplica perdida no tumulto. Víamos o tigre em sua alma rugir, enquanto o coração distante, em Vallen, pulsava um calor fugaz, como se tentasse chamá-lo de volta à luz.
Por um instante, Bellignarior sentiu um calor familiar e áureo tocá-lo, qual sopro suave da mui formosa irmã, pulsava em sua alma. Com um passo adiante, firme como rocha, interrogou os soldados em voz grave:
— De quem sois? 
— Do baronete de Langdoc — volveram eles, com atrevimento nos olhos.
— E onde estão vossos senhores? — indagou em seguida, o tom cortante qual lâmina.
Responderam que já chegariam, e com ousadia vil ordenaram-lhe que se afastasse, pois atrapalhava sua diversão: — Cai fora, que nos estorvas!
Bellignarior não pôde conter um sorriso bestial, torvo e selvagem, que lhe cruzou o rosto qual fera prestes a saltar. Fechando a viseira com um clangor seco, avançou rumo às moças. Os truões, em fúria cega, tentaram barrá-lo, lançando-se contra ele com mãos profanas. Mas, num só golpe, foram partidos ao meio, suas metades arremessadas contra as paredes em verdadeiro banho de sangue, qual oferenda rubra às chamas que nele ardiam. O ar encheu-se do estalar de ossos e do fedor ferroso, enquanto o chão se tingia de vermelho.
Parou ante as cativas, que o fitavam com olhares esperançosos, mesclados de temor. À sua frente erguia-se um monstro de aço negro, coberto de sangue, cuja armadura reluzia em tons rubros sob a luz trêmula. Não sabiam se seria salvador ou algoz, e, em desespero, lançaram-se-lhe aos pés, cingindo-lhe as pernas com súplicas e agradecimentos entrecortados por soluços. 
Mas, para sua infelicidade, os baronetes chegaram, em passos altivos, para reclamar suas presas. Abismaram-se ao ver seus homens em tão grande desconjuntura, os corpos partidos e ensanguentados espalhados qual destroços de uma tempestade. A luz acalentadora que por um instante tocara Bellignarior, eco da mui formosa irmã em sua alma, extinguiu-se de súbito. Chamas rugiram em seu peito, sobrepujando-a com fúria voraz, qual fogo que consome a candeia.
Mais tarde, apenas corpos desmembrados e carbonizados foram achados — soldados, baronetes e as mui desventuradas garotas —, reduzidos a cinzas e ossos calcinados num silêncio mudo que pesava sobre a casa em ruínas.
Por fim, a rebelião findara, e o jovem conde pôde tornar a Vallen, mais rico em terras e ouro, e inda mais temido entre os homens. Mas nada disso lhe importava. Por longo tempo, as visões enxameadas — chamas dançantes e ruínas fumegantes — e o gosto acre de sangue lhe acompanharam, qual sombra que lhe pesava a alma. Até que se viu ante a mui gentil irmã. Ela o encarava com grandes olhos verdes, luzentes como azeitonas maduras, fitando-o com um fulgor que trespassava o véu de trevas em seu coração. Então, consciente de si, tomou-a pela cintura com mãos firmes e gentis, cumulando-a de beijos nas faces, qual irmão que reencontra sua outra metade após longa tormenta.
Assim se passaram os anos, com os dois, em harmonia, assumindo seus lugares de direito. Já poucos se recordavam ou ousavam falar do vaticínio que os prenunciara, perdido nas brumas do tempo. Mas muitos, em segredo, assombravam-se com tamanhas criaturas, bestiais e inumanas, que os gêmeos se haviam tornado. E, sob pretexto do “bem de todos”, tramavam nas sombras livrar-se daqueles dois seres apocalípticos, cuja chama e graça desafiavam os limites do mortal.
Entregaram-se, nesses tempos de paz, às suas mui usuais cavalgadas em dupla, caçadas e banquetes que começavam com o sol alto e iam terminar sob as estrelas, ao convite de outras famílias nobres, cujo renome dos gêmeos alcançara os ouvidos ou que outrora pelejaram ao lado de Bellignarior. Cavalgavam juntos, como se uma só alma guiasse dois corações, e não poucos torneios foram vencidos por ele sob a presença perene da bela irmã, cuja graça parecia abençoada por desígnios altos. Espelhando assim os felizes dias de sua juventude antes das guerras. Nada lhes parecia impossível, e Bellignarior tornou-se convidado de honra em tais eventos. Não havia um só torneio, mesmo nos reinos mais longínquos, em que não fossem aguardados com reverência, qual desafio final aos competidores. Nenhum, por mais valente que fosse, lograva vencer este embate.
Alfionora, altiva em sua beleza sacra, qual visão que os céus houvessem moldado, causava fortes emoções por onde passava. Seus olhos, esverdeados como a esmeraldas, e seu porte, leve e majestoso, cativavam mesmo os homens de corações mais endurecidos. A exceção de alguns mancebos mais jovens e temerários, poucos ousavam lançar-lhe olhares, aos quais ela respondia com um sorriso benigno e puro, como quem reflete a luz divina. Mas tal graça, por mais de uma vez, foi mal compreendida, apenas avivando o tormento daqueles que se aventuravam a achegar-se, julgando poder conquistar o que estava além de mãos mortais e que possuía um belo par de garras, sempre pronto a rechaçar toda e qualquer tentativa com fúria.
Não pouca inveja se erguia entre as damas da corte, que se pasmavam com seu garbo e esplendor. Invejavam-na em silêncio, e donzelas de linhagem mui nobre imitavam-lhe o caminhar leve, os modos gentis e as vestes de tecido fino, buscando capturar um resquício de sua aura. Por mais de uma vez, os gêmeos foram hóspedes do rei e da rainha, com quem partilharam não pouco tempo em mui gentil companhia, sob os olhares de um reino que os via com assombro e reverência.
O inverno dos vinte e quatro dos gêmeos foi mui doloroso, tanto a eles quanto a todo o condado, pois a condessa falecera em seu sono, levando consigo o ânimo do conde pai. Este, que outrora fora pilar de vigor, tornou-se apenas sombra de si, quedando-se assentado a fitar os céus com olhos vagos na maior parte do tempo, como quem busca além das nuvens um eco perdido. Por mais que os filhos se juntassem a ele em longas horas, ali permaneciam, estáticos e silentes, até o escurecer velar-lhes os rostos em penumbra. 
Sucederam-se dois anos, e o velho conde, exaurido pela saudade, foi por nós chamado, pois recebemos mandato de tomá-lo em sua fraqueza mortal. Assim, foi recolhido ao lado daquela a quem tanto amara, entregue à terra gélida do cemitério da diocese de Vallen. Sob o olhar distante dos filhos — o mesmo que lançaram ao ataúde da mãe, baixado dois invernos antes —, partiu, deixando-os sob um fado que os céus há muito viam escrito.
Os dois viam-se sós, os mais novos condes de Vallen, os últimos de sua linhagem, tendo-se unicamente um ao outro, duas almas entrelaçadas que o destino cingira. Por única companheira na terra, tinham a Loba, cuja lealdade bruta se afeiçoara a Alfionora. Esta fera, de passo firme e olhos atentos, fazia-lhe companhia nas saídas de Bellignarior, e ambas velavam tristonhas por seu retorno. Muitas vezes, deitavam-se em languidez melancólica nos aposentos do irmão, onde o vazio, em sua presença mútua, parecia menos cruel. Alfionora, que outrora se ocupava com os pais durante as ausências dele, compartilhava de sua melancolia, agravada pela perda, com a Loba. Assim ficavam, na espera daquele que lhe era sua boca, a chama que pulsava em uníssono com seu coração.
Dedicavam-se na maior parte do tempo aos afazeres do feudo, e dos prazeres antigos apenas as cavalgadas perduravam. Nessas, os dois, abandonando repentinamente a mesa com os papéis a seu mordomo — herdado dos pais, fiel sombra de outrora —, punham-se a meio dia de jornada em qualquer direção que o cavalo tomasse, sem se importarem para onde o vento os levasse. Cavalgavam como quem segue um chamamento que os mortais não ouvem, livres sob os céus que os guardavam. Mas mesmo estas cousas cederam lugar a uma ocupação inda mais antiga. Lançavam largos dias na biblioteca, que sempre mantinham e ora, com as novas riquezas conquistadas e as rendas das terras aumentadas, enchiam de toda sorte de tomos. Os mais proeminentes escritores de magia, filosofia, agricultura, engenharia e guerra alinhavam-se nas estantes.
Esforçavam-se o melhor que podiam para cumprir seus deveres para com o condado e o reino, sempre juntos, como se os céus houvessem talhado seus caminhos em harmonia. Mas, quando se viam forçados a separar-se, ele, mui penalizado, lembrava-se de trazer à irmã algum presente: pequenos baús de ouro repletos de confeitos, colares de prata luzente, todo um jogo de ourivesaria com garfos finamente lavrados, e muitas vezes coroas, brincos e adornos de pescoço, cada qual mais gentil que o outro. Em uma de suas voltas, encontrou Alfionora com um presente para ele: um pequeno medalhão de prata, onde uma mecha de seu cabelo reluzente, imbuída de magia, repousava. Com voz suave, ela lhe disse: — Que um pouco de mim te acompanhe onde quer que fores mantendo o fio estendido ao menos por mais um pouco.
Ele, com o coração mui penalizado, aceitou o dom de todo o peito, cingindo-a num abraço longo, como quem teme perder o que lhe é mais caro. Os verões se escoaram, e os conspiradores rondavam-nos, quais sombras que o vento carrega em silêncio. Embora muitos já não se lembrassem de Nummus, Aruin ou as províncias rebeldes, não poucos guardavam na memória, com ódio e espanto, o cavaleiro negro. Este não fizera muitas vítimas desde então, mas inda era o cavaleiro negro, cuja fama pesava qual trovão distante e aparentava particular docilidade vulnerável no momento. E, nas entranhas do castelo, uma turba de vigaristas recebeu as chaves de uma entrada secreta, oculta na lareira da antessala de um certo quarto. As aranhas teciam suas teias em volta dos dois, qual presságio que os mortais não viam. Pouco sabiam que seu medo se tornaria brutal pesadelo, pois, se temiam o tigre, haveriam de temer ainda mais os dentes que os altos desígnios haviam afiado.
Os que se juntaram a esta conspirata não foram poucos. Não só a nobreza vizinha a Zephyros, temerosa do campeão que lhes sombreava a glória, mas também os elfos negros, sedentos de vingança pelos irmãos que, não fosse por aquele cavaleiro, inda estariam entre os vivos, ergueram-se em ódio. Mesmo seus pares no reino, outrora aliados, voltaram-se contra os gêmeos. Era mui incómodo que tal bruto, a quem chamavam “incestuoso” em sussurros vis, gozasse de tão grande favor junto ao rei. Quando ele se volveria contra eles? Com tais arranjos, não haveriam de esperar muito, pois afiavam o machado que lhes cairia sobre o próprio pescoço, tramando em segredo contra o tigre. 
Viram-se em particular ânimo de avançar com seus preparativos quando ambos os condes partiram para uma assembleia real, convocada para tratar dos direitos numa disputa em que um grupo de barões e baronetes apoiava o visconde de Fallenstia contra seu senhor. Findas as tratativas, apaziguadas pela Igreja e pela imagem temida do cavaleiro negro, reavivada por Sua Majestade, que manteve Bellignarior ao seu lado durante toda a assembleia, armado em sua armadura de oricalco, o rosto fechado qual sentinela de ferro, todos volveram a seus feudos. Aliviados, evitaram perfazer novo derramamento lastimável de sangue copátrio, como se os altos desígnios houvessem, por ora, desviado a mão da guerra que pairava sobre eles.
Entanto, a ausência dos condes permitiu que os invasores trilhassem seu caminho com relativa impunidade, indo e vindo, decorando os passos para o vil acontecimento que os ventos sombrios pareciam soprar, qual presságio que os altos desígnios não revelavam. Ao tornarem a suas terras, os irmãos não tiveram paz, pois o banditismo alastrava-se pelas estradas e vilas, uma chaga que roía o coração do condado. Montando então uma tropa, Bellignarior, acompanhado por aqueles cavaleiros que lhe haviam jurado lealdade e o seguiriam até o fim, lançou-se pelas estradas, caindo sobre os acampamentos dos malfeitores com fúria selvagem. Alfionora, em tudo, seguiu o irmão, favorecendo a tropa e os campónios e moradores com sua magia sacra, cuja luz parecia abençoada por mãos celestes. Socorreram cidades, e em pouco tempo limparam as terras daquela praga, enquanto passavam auxiliando onde podiam com obras e salvamentos ao seu povo, que os via com reverência e gratidão.
Bellignarior mandara forjar para ela uma cota mythrílica, leve, mas efectiva, com um peitoral e um chapéu de aço, armadura que cingia sua graça sem lhe tolher o passo. Assim, juntos, coordenaram suas forças contra os bandidos, restaurando algumas das fortificações das eras da unificação — que tão bem conheciam de suas cavalgadas —, colocando guarnições para ali vigiarem com olhos atentos. E entre deveres burocráticos e labores práticos, velaram intensamente pelo condado.
Marcaram-se inda mais suas benfeitorias quando ambos ouviram que, num bosque que se enfrondava num aglomerado montanhoso próximo a um considerável burgo do condado, dizia-se habitar, numa gruta funda, uma horrenda criatura do início da criação. Uma aracne de proporções gigantescas, suas teias mais fortes que o aço mythrílico mais rijo, tecidas em fios que o tempo não lograva romper. Com dentes e ferrão que derretiam até os ossos de dragões, habitava tal abominação na mais profunda escuridão, um negrume malévolo que engolia em sua peçonha até as lanternas mágicas, cuja luz nada valia para alumiar o covil da besta.
Suas crias infernais lançavam-se de tempos em tempos, tomando caravanas e viajantes nas estradas e roubando moradores de suas camas em pleno luar, para nunca mais serem vistos por olhos mortais. Grande dor e lamento subiam diante das atrocidades cometidas pela besta, que detinha em sua natureza o destilado do mal primordial, mais antigo que todas as montanhas, mas não anterior a nós. Em sua sangria maléfica, sua corrupção caíra sobre a criação, gerando tais abominações peçonhentas e nem mesmo a inquisição ou os inúmeros aventureiros que se lançaram a ela triunfaram contra tamanha vileza.
Portanto, lançaram-se ambos, com um destacamento, à área de influência da besta. Deixaram os cavalos com alguns dos mais pesados couraçados da tropa na estrada e penetraram a mata, não encontrando oposição alguma até o anoitecer, avançando assim com relativa impunidade. Mas, assim que o reino noturno estendeu seu véu estrelado, expurgando o último fulgor de Hélio do horizonte, ouviram ao longe os gritos e relinchos dos que haviam deixado para trás. A partir deste tenebroso momento, viram-se cercados por miríades infinitas dessas abominações de oito pernas, que, com seus incontáveis olhos negros, lançavam-se de cima, dos lados e de baixo. As malditas criaturas desciam de suas teias sobre os chapéus de ferro e os ombros dos coitados, rasgando as cotas que lhes cobriam o pescoço e o corpo, enquanto as que vinham de baixo cortavam os sabatons com suas quelíceras, transformando em suco de carne e tendões as pernas e pés dos infelizes. Estes ardiam em excruciante dor que lhes subia até o coração, um tormento que os gritos não logravam expelir. 
Bellignarior, elevando a irmã em seus braços sobre o revolto mar negro que tornara-se o solo do bosque, acendeu-se, fazendo subir o cheiro acre de carapaças queimadas enquanto a levava até os feridos. Cuidava a princípio para que o fogo não ardesse da cintura acima, nem que as labaredas lambessem os servos, temeroso de feri-los. Mas aperceberam-se que suas chamas pouco efeito tinham sobre ela, terminando por esturricar os serezinhos abomináveis que tentavam perfurar-lhe o elmo. Assim, incólumes ao toque, prosseguiram pela mata densa, sob a guia de um orbe luminoso que Alfionora conjurara, cuja luz pura afastara por ora os aracnídeos monstruosos, um clarão que fendia o negrume malévolo.
Sempre que um daqueles milhares de pequenos olhos diabólicos reluzia à luz, um dos soldados apressava-se a lançar-lhe um dardo com uma besta, derrubando as crias da grande Aracne. Lançaram em chamas algumas dezenas de cavernas e entradas, seguindo sem rumo, mas como que pela inexorável força do Destino alcançaram seu alvo, como se a fortuna os guiasse. Ao adentrarem, a luz do orbe pareceu furtada e já não brilhava como antes. Caminharam nessa escuridão medonha por algum tempo, dois terços de hora a saber, quando, horrorizado, um dos homens não pôde conter um brado, seguido por um pequeno grito de Alfionora, que envolveu com os braços a cabeça do irmão. Aquela densa escuridão que parecia tocá-los não era senão milhares, centenas de milhares de aranhinhas que já tomavam por completo a armadura dos homens que os acompanhavam, deixando assim os gêmeos sós a encarar a desfilhada maldição encarnada. Esta, ocupando o fundo da caverna com seus grandes olhos avermelhados e seu vasto abdómen, que terminava num esverdeado doentio, resplandecia como magia necrótica, mas inda mais tóxica. Suas grandes quelíceras e enormes pernas peludas, com pontas pontiagudas que lembravam unhas curvas do tamanho de um braço de homem, cercavam-na por todos os lados numa grossa camada de teia inexpugnável, que abria apenas um pequeno e tortuoso caminho, qual via sacrificial ao altar das suas vítimas.
Não poucas vestes e couraças jaziam ali, despojadas de seus senhores, que repousavam nas profundezas ácidas da grande Aranha e de suas filhas. Decidiram queimar aquelas grossas camadas de sudário com as chamas que arderam como rio transbordante, sem fim. A grande Aracne, porém, apenas se irritou, lançando suas “lanças” contra os gêmeos, que com custo as desviaram. As patas marcaram e afundaram a armadura de Bellignarior em mais de um ponto, e numa enxurrada de veneno tentou envolvê-los, por pouco não os derretendo. Ele, tomando a irmã à frente, lançou-se contra uma das paredes, flambando-a no processo, livrando-se assim das abominações que ali habitavam antes que a tocassem, e prosseguiram, fugindo aos ataques da besta.
