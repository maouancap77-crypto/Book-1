Até que Alfionora conseguiu invocar um encanto a que chamavam nova stellarum, mas que nada mais era que o acumular de energia arcana, revolto em seu núcleo, despejado na direcção que o invocador desejasse, mui usado contra criaturas da noite, espectros e outros seres de trevas. Não se tratava de simples invocação, e longo tempo levou para que ela o sintetizasse e estabilizasse, enquanto o irmão saltava de um canto ao outro, trocando rajadas flamejantes com a besta e suas crias. A viseira sulcou-se logo à frente do olho direito por um dos golpes da criatura. Por fim, Alfionora, elevando-se e relampejando, despejou um raio sacro contra a fera, vulnerabilizando-a e lançando às cinzas suas crias. O irmão aproveitou, saltando a cravar sua espada no cefalotórax da criatura, que soltou um bramido horrendo, fazendo regurgitar todo o complexo montanhoso. Levantaram-se assustados de seu sono todos quantos dormiam na região, homens e animais de igual modo amedrontados por berro ancestral tão horrível. Não se dando por vencida, a criatura sacudiu-se violentamente, tentando livrar-se do cavaleiro agarrado a seu meio, cravando-lhe as patas à volta, afundando o oricalco onde o atingiu, enquanto as “unhas” queimavam e derretiam em asqueroso odor que a tudo empesteou. Ele, por sua vez, lançou uma enxurrada de fogo pela espada para dentro do ser maligno, que ardeu. Pesando-se abaixo, fendeu-lhe o longo abdómen, partindo assim da cabeça ao ferrão a abominação que ali habitara por séculos incontáveis desde os primórdios da criação.
Voltaram assim vitoriosos, sob os olhos gratos dos que ali habitavam, felizes por se verem livres das garras negras da abominação, bem como abençoados por nós, que de igual modo lhes aprovámos tal empreitada com sorrisos, e ventos deliciosos lhes acompanharam a volta para casa, onde, para total infortúnio, o mal os aguardava de braços abertos. Oh, como quisemos nós garantir-lhes delícias nestes tempos em que ainda os tínhamos incólumes!
Passaram-se mais alguns meses, e numa longa noite que já se transcorria, Alfionora despediu-se do irmão com um beijo gentil na face, levando consigo a Loba para ir dormir. Ele, porém, permaneceu com o senescal e o mordomo seu chanceler, a decidirem os próximos afazeres, pois a colheita daquele estio se aproximava. O mordomo, recomendou que deixasse o labor para o novo dia e fosse repousar, como Alfionora fizera, mas ele recusou-se, com pressa em livrar-se da tarefa, como quem sente o peso de um fado que não nomeia.
Por volta da quarta vigília, um ganido agudo trespassou o silêncio, vindo do norte do paço. Bellignarior, com voz firme, ordenou que fossem ver o que se passava — talvez Alfionora, no escuro, houvésse pisado a cauda da Loba. Volvendo aos papéis, mergulhou de novo nos labores, mas uma sina mui pior e cruel se desvendara, qual sombra que os céus não puderam deter. Quatro vilões, imundos e brutais, saltaram da chaminé, vindos das masmorras por um caminho facilitado por uma alta figura traiçoeira do castelo. Desembocaram na antessala do quarto de Bellignarior, mas, não o encontrando, saíram ao corredor. Ali depararam-se com Alfionora, que passava sonolenta, os olhos ainda velados pelo cansaço.
A Loba, fiel guardiã, lançou-se contra um deles com fúria selvagem, arrancando-lhe o braço num jorro de sangue negro, os ossos estalando como gravetos secos. Mas um outro, em golpe vil, esmagou-lhe a cabeça com uma maça, o crânio fendendo-se num ruído surdo e horrendo, e a fera tombou, fora de combate, o chão tingido de vermelho viscoso. Alfionora, despertada em terror, ergueu as mãos para conjurar, a luz sacra de sua alma começando a brilhar. Mas os brutos, quais bestas sem alma, calaram-na com violência profana: um tampou-lhe a boca com mãos ásperas, sufocando-lhe o grito, enquanto outro lhe prendeu os braços atrás das costas, torcendo-os até os tendões rangerem, a carne ferida sob dedos imundos.
Buscaram Bellignarior nas imediações, mas, não o achando e ouvindo os passos da serva que acudira ao ganido, perderam toda razão. Num acto de sacrilégio atroz, cravaram uma adaga naquele fino e ilibado pescoço, cuja brancura marmórea reluzia qual dádiva dos altos desígnios. O sangue, fino e rubro, escorreu em fios quentes, manchando a pele pura, enquanto o coração dela, acelerado em pavor, batia em desespero, desacelerando a cada pulsar, até silenciar num vazio que trespassava o mundo terreno.
Na torre, onde tratava dos negócios, Bellignarior caiu de joelhos, mortificado, como se uma lança invisível lhe houvesse traspassado o peito. Os olhos encheram-se de lágrimas ardentes, e sentiu o véu de sua alma ser brutalmente arrancado, rasgado em farrapos sangrentos por mãos que os céus jamais perdoariam. Uma voz fraca e suplicante, qual sussurro que se extingue, ecoou em seu ser: 
- Adeus meu mui amado irmão. 
A dor, enorme e existencial, era um abismo que lhe dilacerava o peito, arrancando-lhe o coração e deixando um buraco pingante de lágrimas, um vazio que lhe roubava a própria essência. Nenhum grito lhe saía da garganta, apenas um silêncio oco, mais brutal que qualquer ferida, pois com ela morrera metade de si, e o tigre, agora sem seu coração, jazia quebrado ante um fado que os ventos sombrios haviam selado.
O rugido lhe faltava, preso na garganta, um grito mudo que não se libertava. A serva, trespassada de pavor, soltou um brado agudo que rasgou a noite, e logo a guarda acorreu em tropel para acudí-la. Ele, qual estátua caída, ascendeu no ar, o corpo trêmulo envolto em chamas que não ousava conter. Os papéis abrasaram-se em cinzas dançantes, e o senescal e o mordomo, com o coração na boca, fugiram da torre às pressas, enquanto tudo se tornava enxameado, um caos de fogo e ruína que os ventos sombrios pareciam soprar. Bellignarior sabia, em sua carne e alma, o que se passara — não precisava ver, mas mesmo assim devia. Com um esforço que jamais exigira de si, ergueu-se, os passos pesados marcando o chão em carvão ardente, cozendo a pedra e a madeira que lhe cruzavam o caminho numa trilha de destruição cega.
Chegou à antessala, lançou um olhar dolorido à Loba, cuja cabeça fendida jazia num lago de sangue viscoso, e murmurou com estranha tacidez, a voz rouca e quebrada: — Cuidaremos de ti, velha amiga.
Então, lançou-se sobre o corpo da irmã, que já o deixara. Um feitiço de cura a nada serviria, pois nós, já havíamos recolhido tão bela alma às esferas celestes. Deixou cair suas últimas lágrimas, as únicas e derradeiras, pingando quentes sobre a pele marmórea dela, pois jamais seria capaz, mesmo que o quisesse, de vertê-las novamente sem seu coração. Nada lhe restava senão um oco enorme, um vazio que lhe dilacerava o peito, e lá no canto, ardendo, mas estranhamente enlutado, a chama que outrora rugia recusava-se a erguer-se, como fera ferida e acuada, tolhida por uma dor que os homens não podiam nomear. Pousou os lábios na testa da única que amara, a pele fria qual alabastro partido, e apertou-a entre os braços uma derradeira vez, num abraço que lhe rasgava as entranhas. Ficou assim, reclinado sobre aquela sua outra face, o sangue seco dela manchando-lhe as mãos, até o alvorecer tingir de cinza o céu sobre aqueles que os traíra.
E assim, aos vinte e oito anos, Alfionora suspirara seu último fôlego sobre tão ingrata terra, a alma gentil arrancada em sangue e traição, deixando o tigre ferido e faltante, um vazio brutal a sangrar em seu peito. Mas ele se levantaria, com as entranhas rasgadas e o coração em cinzas, e se recuperaria, pois importava que tudo devorasse em sua fúria selvagem. Assim fora dito nos fios do destino que os altos céus haviam tecido, e nada que os mortais, em sua vã ousadia, pudessem realizar mudaria o fado que os ventos sombrios selaram. E todos vós, ó malfeitores vis, que levantastes mãos profanas a derramar o sangue inocente, ardereis em igual medida! As chamas da vossa iniquidade vos consumirão, e sereis visitados em ira até à terceira geração, pois assim importa que se faça a justiça celeste, selada nos altos desígnios que não se dobram ante a vilania dos homens. Que os ventos sombrios, portadores do juízo, vos tragam o peso do que ousastes ferir, e que a terra ingrata, manchada por vós, clame por vossa ruína!
A primeira ordem que lhe saiu da boca, em rosnado rouco e feral, enquanto transportava o corpo gélido da irmã ao leito com mãos afundadas, quais garras selvagens cravadas nos mantos dela, ensanguentadas e pulsantes de ira e excrucio, foi que fechassem os portões. Era como se pudesse selar o mundo contra os responsáveis, aprisionando-os ao peso da dor que lhe trespassava o peito. Mas tal já fora feito pelo comandante da guarda, em presságio sombrio. Então, com o coração em frangalhos, rapidamente escreveu uma carta, selada com dedos que mal continham o tremor, ao seu preceptor, o Arcebispo, despachada a toda pressa por um cavaleiro de sela firme. Nos seguintes termos, gravou sua alma ferida:
—“Se inda tendes em vosso intento, como sei que outrora desejastes, levar-me ao seio da santa madre Igreja, vinde ter comigo sem demora alguma. Trazei convosco magos mentalistas, ou nunca mais vereis meu rosto. Suponho que assim o quereis, ao saberdes que meu coração já entre nós não está roubado por mãos vis que dos céus e tampouco de minha parte receberão perdão. Sinto-me as forças furtadas por ora, mas em breve pretendo reavê-las. Apressai-vos, enquanto ela ainda me comanda, ou o que nos restara senão ossos calcinados?”
O cortejo episcopal chegou ao castelo ao meio-dia, o Arcebispo acorrendo a Bellignarior com passos apressados, apenas para encontrá-lo ajoelhado ao lado do leito onde jazia a irmã. A mão esbranquiçada dela, fria qual alabastro partido, repousava entre as dele, que, trêmulas e manchadas de sangue seco, apertavam-na como se pudesse reter o que os céus lhe haviam roubado. Sobre elas, ele descansava a testa, um peso mudo de luto e ira que lhe curvava o corpo qual fera acuada. A Loba, curada pelo físico do castelo, deitara-se uma última vez sobre o ventre de sua senhora, o focinho pousado na carne silente, como quem guarda um tesouro que o destino já reclamara.
O Arcebispo, cujo coração se desesperara ao receber a carta, ora se lamentava com gemidos abafados, os olhos marejados ante o sacrilégio que ali se consumara. Em sua alma, bradava que deviam ter trancafiado os irmãos num convento, sob as santas paredes da Igreja, mas uma dúvida cruel lhe apertava o peito: teria tal feito resistido ao destino? Quem poderia deter o fado que os ventos sombrios teciam? Este pensamento, qual lâmina fria, trespassava-lhe as entranhas, pois desconfiava estar certo neste último corolário. E, se assim fosse, só restariam as chamas inevitáveis, um fogo que os altos desígnios já haviam acendido. Aquela calma enlutada, momentânea e frágil, era senão o silêncio dos ventos antes da tempestade que tudo devoraria.
Sucedeu pois que, com pequena intervenção de nossa parte, o punhado de vigaristas que participara e lograra sobreviver ao ataque encontrou seu fim. A corda com que desciam do muro, numa parte pouco vigiada por detrás do torreão, rompeu-se num sopro súbito, qual sussurro do juízo que os ventos celestes carregaram. Desabaram ruidosamente no fosso, os ossos estalando contra a pedra fria num clangor de ruína, e a guarda acorreu a capturar os fraturados, que se erguiam assustados e enlameados lá de baixo, as carnes rasgadas e os rostos lívidos de pavor. Os dois que caíram, bem como o terceiro que ficara para assegurar a descida, foram pegos, suas sombras trémulas iluminadas por uma luz que os altos desígnios fizeram brilhar com vigor. Seus movimentos ecoaram com especial sonoridade, como se a terra mesma clamasse por justiça. Se o fado do Tigre era selado, dava-se a conhecer o destino daquela rale vilã por mãos que os mortais não viam, mas cujo peso sentiam em seus ossos quebrados. Haviam de encarar as garras para expiar parte de suas vidas miseráveis.
Ao entrarem nas masmorras, foram recebidos por Bellignarior, que saltou sobre eles qual tigre enfurecido, o gosto sanguinário tomando-lhe os sentidos em voragem selvagem, mas consciente de cada acto atroz. Um braço aqui, uma perna ali, arrancados com mãos que mais pareciam garras, o cheiro de carne queimada subiu pelas paredes, impregnando os tijolos com gordura negra e fumaça acre, um fedor que trespassava a pedra. Os gritos, incessantes e roucos, ecoavam qual lamento das profundezas, mas todos — a guarda, os clérigos e nós, que em silêncio contemplávamos — tampávamos os ouvidos, pois haviam de ser lançados em chamas eternas mui piores que aquelas, seladas por um juízo que os ventos celestes já carregavam.
Eis a utilidade que Bellignarior deu aos magos mentalistas do Arcebispo. Introduziu os interrogados aos pobres clérigos, cujos rostos lívidos e estômagos revoltos despejavam tudo que neles havia, vomitados em golfadas de horror ante tal carnificina. Viram-se forçados a ler as mentes dos criminosos, arrancando-lhes, entre gemidos e súplicas, uma lista de vinte e dois nomes: quatro barões vizinhos, um conde, três viscondes, um cavaleiro de nome Gawain, a maga da floresta, Allentia, que os auxiliara com poções vis, duas servas, um auxiliar de cozinha, e um nobre elfo negro, de linhagem ligada à realeza dos tais elfos, até então desconhecido. Completavam-na seis campónios que os acolheram, um guarda que facilitara a entrada, e um burguês proeminente de Nummus, cuja família perecera no incêndio e que, com ouro amargo, sustentara a empreitada.
Uma imagem distorcida, uma sombra negra, também participara, entregando as chaves do castelo aos criminosos e ensinando-lhes o caminho e a rotina dos condes. Mas nem sob ameaças, com as chamas já lambendo-lhes a carne e o báculo do Arcebispo a conter os mentalistas, lograram os clérigos discernir quem era tal figura abjecta. E embora soubéssemos, em silêncio sob os altos desígnios, não pudemos agir para revelá-la. Devia ela acumular suas maldades sobre sua cabeça, até que a balança do juízo se pesasse e sua falta, por fim, cobrada fosse com o rigor que os céus guardavam. Terminou-se pois com as cabeças carbonizadas dos perpetradores, inda vivas, espetadas em chuços aos portões da cidade, os olhos abertos em terror mudo, a carne crepitando e os ossos expostos, qual aviso que a terra mesma gritava.
Mas o dia inda era claro, e convinha punir muitos ainda. Uma longa sequência de supliciados foi desmembrada, degolada, cremada e fendida ao meio, os corpos rasgados em jorros de sangue e ossos partidos, sob o peso da ira de Bellignarior, que se encarregava pessoalmente das punições. Os pobres clérigos e o próprio velho Arcebispo, de coração trespassado e forças exauridas, vieram a desfalecer ante tamanha barbárie. Seus poderes, solicitados com intensidade cruel, obrigavam-nos a vasculhar os recônditos mais profundos das mentes dos envolvidos, sob o baforar flamejante do Tigre. Este rosnava e ardia a cada respiração, o hálito quente queimando-lhes os lados das faces, a carne chispeando e os olhos marejados enquanto mergulhavam nas trevas do pensamento vil, arrancando confissões em golfadas de horror.
O Tigre, a cada morte, recobrava-se, o sangue rubro lambendo-lhe as garras e erguendo-o altivo da toca onde se enfiara. A chama ardia, mas já não turvava; parecia, enfim, ter plena ciência de si, uma lucidez enervante nascida da auto-tutela. E, nesse furor, as famílias dos supliciados também — por que não? Sangue era sangue, e assim convinha alimentar-se, pensava o Tigre, pois que haveria de perder? Ou melhor, que importaria? Apenas o sangue e as chamas eram verdadeiros; o resto era resto, cinzas e pó que os ventos sombrios varriam, enquanto os altos desígnios pairavam em silêncio sobre o festim de brutalidade e ruína.
Após o cortejo fúnebre de Alfionora, que foi sepultada num mausoléu que se tornaria grandioso, a derradeira obra de Bellignarior durante os anos que lhe convinha dominar, deixou-se cair, exaurido, na sala que outrora pertencera a seu pai. Afundou-se na larga cadeira, envolta nas sombras, e ali permaneceu na escuridão por um tempo, o peso do vazio a esmagar-lhe os ossos. Permitiu-se fechar os olhos, e uma voz inaudita até então se apresentou — grave, pesada, sanguinária e tenebrosa, mas quase um afago, como se lhe envolvesse num manto de peles rudes e quentes. Era antiga em extremo, conhecida em extremo, nascida das chamas que sempre o habitaram. Aquela meia face de Tigre, em sua forma incompleta e plena, esfacelada à esquerda numa horrenda ferida sangrenta, a carne rasgada e o osso exposto pingando vermelho vivo, estendeu-lhe a pata, o olho ardendo em ansiedade feral, qual braseiro que nunca se apaga. E indagou, num ronco que transmutava a alma:
— Vamos?
E ele, após um momento de encanto com a fera que finalmente se revelava por inteiro, um espelho de sua alma rasgada, volveu em tom obstinado:
— Até o fim.
Necessário era punir os que estavam longe, mas iniciaria pelos mais próximos. A feiticeira Allentia e o cavaleiro Gawain jaziam ao alcance de suas garras, e Bellignarior, lançando-se a cavalo em sua armadura negra, enfiou-se na mata onde a maga habitava, o coração ardendo em flama que os ventos sombrios pareciam avivar. Antes de partir, deu ordens aos seus cavaleiros — aqueles jovens da empreitada de Nummus, cuja lealdade fora forjada em supremo espetáculo de chamas —, erguendo um deles ao posto de Marechal. Mandou que vendessem tudo quanto não servisse à guerra: mobília, joias, vestes e propriedades, recolhendo os fundos com mão firme; que acordassem pelo maior preço a venda de toda a colheita, após retirar aos estoques dos fortes o que bastasse para a prolongada peleja; e sujeitou todos os seus homens de armas a um juramento perpétuo de sangue, selado por seu próprio poder mágico, sob a maldição de uma morte dolorosa para si e seus filhos caso o pacto fosse quebrado. Após acertar estas e outras medidas, partiu seguido da loba.  
Ora, esta Allentia era uma maga herbórea de singular capacidade em poções e alquimia, habitando numa choupana de madeira há mais de dezoito décadas. Por elixires e magias, mantivera sua carne em boa força e aparência, fugindo às garras de Chronos, embora o peso dos anos lhe corroesse o spiritus vitae e a alma em segredo. Cada vez mais caros ingredientes exigiam-se para sustentar essa juventude carnal, razão pela qual aceitara de bom grado as trinta moedas que lhe ofereceram por um saquitel de poções de invisibilidade, cura e veneno.
Não pouca surpresa teve a mulher ao volver de sua colheita de ervas e encontrar na sala o cavaleiro negro, cuja sombra se erguia qual presságio de morte. Com um grito abafado pela própria mão trémula, apressou-se em reverência afobada: — Meu sire, que pode vossa serva fazer por meu senhor nesta tarde?
Ele nada respondeu, apenas pousando sobre ela o olhar enxameado, as pupilas dilatando-se em magia, as íris transmutadas do verde ao laranja relampejante, brasas vivas que os ventos sombrios pareciam avivar. Gaguejando, a mulher tentou salvar-se, os encantos traiçoeiros dançando em sua mente. Um pouco de erva demoníaca no chá lhe resolveria o problema, pensou, prevendo a sombra macabra que se tornava cada vez mais pontiaguda sobre ela: — Senhor meu, mui grande honra tê-lo em minha humilde morada. Aceitais um chá nesta bela tarde?
— Quanto valeu a ti a vida dela? — indagou ele, finalmente, enquanto punha o capacete, a voz grave cortando o ar.
— Perdão, meu senhor, podeis repetir a vossa serva? Estes longos anos fizeram-me meio surda — devolveu ela, com um sorriso embotado, os lábios trémulos de falsidade.
— Quanto? Por quanto nos avaliaste, rameira velha?
O insulto apagou-se num ronco rouco, um som de chama que se acende, crepitando na escuridão. Espavorida, a mulher ergueu as saias e lançou-se a correr pela porta, mas viu a casa desintegrar-se atrás dele em chamas vorazes. Ao sair, deparou-se com um muro de fogo que ardia toda a floresta, cercando a clareira numa dança de brasas e cinzas.
 — QUANTO?!
Este brado horrendo, qual trovão que rasga a terra, foi a última coisa que ouviu antes de ser erguida pela face, a pele crepitando e os ossos dissolvendo-se em cinzas ao toque da manopla negra, um pó fino que o vento levou. — Cinzas às cinzas, do pó ao pó — disse ele, com voz pesada, o mote que lhe seria dali em diante tão comum, selado em sangue e chama.
Lançou-se à torre onde morava o cavaleiro Gawain, atingindo o lugar à meia-noite sob um luar que os altos desígnios haviam velado. Gawain acordou com o cheiro acre de fumaça, olhou pela janela acima do leito e não encontrou a lua, embora fosse lua cheia. Tudo era negro, o ar sufocado por um fedor insuportável. Compreendeu que a casa ardia e, ao descer, pondo as calças em desespero, deparou-se com dura visão: suas filhas, filho e mulher queimavam em tormento, as carnes borbulhando e os gritos cortados, perante o cavaleiro negro. 
Com lágrimas infindáveis nos olhos, tomou a espada e lançou-se contra o demónio de armadura, mas, num só golpe, Bellignarior despojou-lhe as pernas, o sangue jorrando em poças rubras. Desesperado e enfurecido, Gawain rastejou, as mãos crispadas buscando o cabo da lâmina, até que o Tigre pisou-lhe as costas, queimando-lhe a carne com um crepitar de brasas, a pele fendida em chagas fumegantes. 
— Porquê? Não te venci eu em justa peleja? Não te estendi o braço quando caíste da montaria? Porquê me pagaste assim? 
— Demónio! Abominação! — foram as respostas de Gawain, cuja voz se quebrou quando o coração lhe foi trespassado pela espada de Bellignarior, a lâmina sangrenta selando seu fim.
Naquela noite, ele não tornou ao castelo. Lançou-se pela colina, parando num campo de ervilhas onde outrora repousara com ela nos braços um do outro, o aroma doce dela enchendo-lhe o peito. Com um de seus rugidos bestiais que fizeram toda a terra a volta tremer, lançou o lugar em chamas, o fogo devorando os talos tenros enquanto corria até o amanhecer, parando à porta do barão de Mercinor, um baronato do condado de Vallen, posse de um dos lordes derrotados na rebelião.
Foi recebido pelo barão apreensivo, um sujeito esguio, cinco anos mais velho que Bellignarior, mas menor em porte e estatura, os dedos nervosos apertando-se uns contra os outros enquanto interrogava a razão da visita de seu senhor. Meia centena da guarda rodeava-o, lanças em riste, e outro punhado vigiava dos muros, os olhos fixos na sombra negra que os ceifeiros pareciam acompanhar. 
— Esforças-te em demasia por nós — rugiu a voz do Tigre em seu peito, grave e feral, como se a fera que nele habitava falasse por ele. — Poderás com eles, sem dúvida, mas e com os que vierem depois?
Ele aquiesceu, enquanto era encaminhado pelo barão, hesitante e trémulo, a uma sala onde lhe serviram uma refeição. Sempre sob o olhar atento dos homens do barão, cujas mãos crispadas repousavam sobre as armas, temiam a sombra negra que os ventos sombrios pareciam envolver. E afinal, mais serviria à chama que ardia em sua alma se não destruísse aqueles recursos, pois o baronato lhe pertencia por direito. Não convinha arrasar com as próprias mãos bens tão valiosos para a guerra que, sem dúvida, deveria empreender contra todos os que se levantaram e se levantariam, uma peleja que prometia inda maior fartura de sangue que tão vão massacre.
Devorava sangrento o javali que lhe serviram, os dentes rasgando a carne quase crua em jorros rubros que manchavam a mesa, enquanto todos os ali presentes — o barão, a guarda e até os servos que traziam as travessas com mãos trémulas — o fitavam com seriedade tumular, o ar pesado como se os ventos sombrios houvessem selado o momento. Bellignarior, com o Tigre ecoando grave em seu peito, lançou ao ar, a voz feral cortando o silêncio: — Quem dentre vós é por mim?
Um punhado de olhos confusos o fitou, e o barão, apressando-se em falsidade, acorreu: — Eu o sou, meu senhor.
— Mentes — trovejou o Tigre, os olhos de Bellignarior incendiando-se em brasas que não mais continha.
E continuou, a voz da fera crescendo em fúria selvagem: — Quem de vós é por seu real senhor e senhora?
Alguns da guarda, com sorrisos brutais, bateram os punhos nos peitorais, o som ecoando qual tambor de guerra. Enquanto devorava um dos pernis, o Tigre falou por ele, o tom grave e cortante: — Se sois por mim, trazei-me a cabeça de vosso indigno senhor.
Uma breve confusão se instaurou. O barão saltou da cadeira, que caiu ruidosamente ao chão, e bradou, a voz trémula de pavor: — Não podeis fazer isto! Não podeis derramar o sangue dos servos de Sua Majestade, o rei! Apenas o julgamento do conselho real o pode, e o rei, nosso senhor!
— A CABEÇA! — bramiu o Tigre, elevando Bellignarior da cadeira, o ar fervilhando à sua volta, raios vermelhos e laranjas saltando dele qual trovão vivo que sua alma rasgada desatava.
Num golpe limpo, um dos guardas atrás do barão, com um chafariz de sangue que pintou a mesa em vermelho vivo, decapitou seu senhor, a cabeça rolando com um baque surdo sobre o chão ensanguentado. Bellignarior, com o Tigre a brilhar em seus olhos, respondeu com um sorriso selvagem, os dentes ainda tingidos de carne e sangue. Após terminar de se alimentar, como se nada houvesse ocorrido, designou um novo comandante ao castelo e ordenou que os demais seguissem à capital condal, levando consigo tudo de valor em Mercinor — ouro, armas, provisões. Mandou que a mulher do barão e o chanceler fossem lançados da muralha, os corpos estatelando-se contra a pedra fria num eco de ruína que os altos desígnios pareciam haver selado, e assim voltou à capital.
Um mensageiro do rei veio ter com ele mais tarde naquela semana, portando as palavras de Suas Majestades, o rei e a rainha, que muito se condoíam por sua perda e faziam votos por suas melhoras. Prometiam perdoar-lhe a ofensa da morte do barão se deixasse de lado os preparativos bélicos que realizava, pois já se tornara notória a transformação de candelabros e prataria em alabardas, bacinetes e cotas, forjados em fogo de ira. Ordenara, ademais, convocação total e irrestrita a todos que pudessem pegar em armas no condado, bem como a reforma e total reocupação das cinquenta e duas fortificações da era da unificação — fortes, postos avançados, torres e castelos —, erguidas outrora em tempos de glória. Mandara recondicionar dois enormes trabucos, achados em ruínas de um castelo abandonado, outrora visitado em cavalgadas com sua gentil irmã, e somara a estes a construção de mais doze peças novíssimas de igual porte, além de dezenas de onagros, balistas, torres de assalto e aríetes, um arsenal que a sombra do Tigre parecia abençoar para a guerra.
Respondeu ao enviado — o Tigre ecoando grave em seu peito —, com voz feral e cortante, que agradecia as condolências reais e que seu senhor, o rei, não devia temer, a menos que fosse malfeitor. Pois o Tigre só se voltava contra os que tivessem o sangue sacro em suas mãos e seus aliados, uma ferrenha ameaça que pôs em colisão o próprio reino de Zephyros. Muitos de seus companheiros titubearam nesse momento, os corações pesados ante a visão de enfrentar seus pais, mas o juramento de sangue, selado em maldição, impedia-lhes a deserção. Confortavam-se na esperança de que a hoste real não se envolvesse enquanto puniam os condes de Telurian e Varda, bem como seus vassalos, num intento que os altos desígnios pareciam observar em silêncio.
E assim, à frente de trezentos cavaleiros de armaduras reluzentes, mil e duzentas couraças de peitos resolutos, e mil arqueiros de arcos tensos, além de pajens e escudeiros, Bellignarior lançou-se rumo ao oeste, às terras de Varda, suas vizinhas. Após estas, passaria pelo principado de Arquent e pelo condado de Martor, da condessa Alissande Marer, a fim de alcançar Telurian, um caminho de fogo e sangue que a chama em sua alma ardia por cumprir.
O visconde de Varda era homem experimentado nas artes da política e gozava de bom nome nas cortes de seu senhor, o príncipe Audric, sire imediato do principado de Arquent, por onde Bellignarior pretendia abrir passagem. Ao saber da aproximação das forças de Vallen, despachou cartas aos quatro ventos a todos os seus aliados, co-conspiradores, bem como a seu lorde. Esta última tardou a alcançar a corte do príncipe, que, com sua esposa, a condessa de Brelanor, residia no palácio de Neslon, na capital real, a poucos quarteirões do palácio régio. Toda sorte de infortúnios acometeu os pobres mensageiros em seus caminhos, e estes, volvendo os olhos aos céus, resmungavam por sua miséria, pagando o preço pelos pecados de seu senhor.
Já avizinhando-se a força de Vallen, o visconde, em desespero, lançou um apelo com farta quantia de ouro a todos que pudessem acudir-lhe em salvação. Algumas companhias de mercenários e aventureiros atenderam ao chamado, com uns poucos magos juntando-se à sua causa, enquanto reunia toda a sua força — que, na melhor das condições, perfazia trezentos homens de infantaria pobremente equipados, na maioria aldeões armados com machados e garfos de feno. 
Os espiões de sua conspirata deram-lhe a saber que grande quantidade de tranqueiras vinha a seu encontro, e, não podendo suster cerco prolongado — fosse pela precariedade de suas fortificações, muitas abandonadas por sua posição setentrional no reino, livre de ameaças, ou por sua capital, a mais bem preparada, contar apenas com uma parca paliçada de madeira em volta de um muro não mui melhor que o de Nummus —, sabia que expor suas cidades a cerco seria loucura. Conhecida em demasia a sina desta última, e os primeiros lugarejos de Varda já ardiam em chamas.
Portanto, reuniu todas as suas forças e postou-se a bloquear, num local elevado cuidadosamente escolhido, a chegada das tropas inimigas. Sob os conselhos dos mercenários, ordenou que uma rede de trincheiras e fortificações fosse erguida, e longas dóris, preparadas e escondidas rentes ao solo, aguardassem para surpreender qualquer ataque da orgulhosa cavalaria de Vallen, que reluzia a milhas em suas couraças e cotas. Assim, com quatro centúrias, o visconde dispôs-se, deixando uma em reserva, preparando-se o melhor que pôde.
Quando as forças de Vallen alcançaram a colina onde as tropas vardonianas os esperavam, para surpresa de Varda, um emissário de alta proeminência — a saber, o filho do barão de Balinor, senescal do duque — veio ao encontro com uma carta aberta, do seguinte teor: —“Poupem-me ao trabalho e vós ao desespero, ou com mui prazer me refastelarei em vossos sangues e nos sangues dos que amais. Tributai-me o sangue do iníquo e vivereis mais um pouco.”
Riram-se da carta e muito repreenderam o jovem por seguir tão desvairado senhor, dizendo que devia envergonhar-se de tal truão. Mas ele, lançando-lhes um olhar tristonho, saiu com as palavras: — Enquanto aqui estou, vivereis; mas, ao sair, que Deus tenha piedade de vossas almas.
Em verdade, ao montar e retornar às suas fileiras, muito se perturbaram os do partido de Varda. Ordenaram que passassem revista às posições, mas, não encontrando alteração alguma, concluíram que a ameaça não passava de logomania descabida. Orgulhosos, crendo que dariam ferrenha luta ao opositor, prepararam-se ao combate. No entanto, ao retornar, o jovem deu a Bellignarior o fruto de sua verdadeira missão: contara o número de tendas e a disposição das tropas em seu caminho, revelando-lhe ainda as trincheiras e fossos cavados ao longo da rota.
— Mais sábio é ele do que imaginei, mas não importa. Convém que nos saciemos. Venham — foram as palavras de Bellignarior, o Tigre ecoando grave em seu peito, enquanto se erguia entre seus comandantes e montava.
Os vardonianos observaram confusos quando as linhas metálicas de Vallen se puseram em marcha rumo ao leste, afastando-se da colina. O flanqueio parecia improvável, quiçá impossível, pois não poderiam avançar sem serem vistiçados, e as trincheiras a circundavam. Julgando-se vitoriosos, crendo que o temido cavaleiro negro não era assim tão impetuoso, iam afrouxando a guarda, quando avistaram três cavaleiros a aproximar-se. O da frente trajava sua armadura negra com penacho vermelho-sangue queimado. Enlouquecera, sem dúvida. Assim que estiveram ao alcance, os aventureiros e mercenários cravejaram-nos de dardos e flechas, mas pouco efeito tiveram contra suas couraças. Avançaram até saltarem de seus cavalos na primeira linha de trincheiras. Durante todo aquele entardecer, viu-se e ouviu-se apenas o avançar do fogo, linha a linha, posição a posição, destroçada por chamas imparáveis. Os dois que o acompanhavam finalizavam os agonizantes em seu caminho, as lâminas cortando carne e osso em jorros rubros, enquanto as forças, nada profissionais, romperam em desespero após a queda da terceira linha. Precipitaram-se à retaguarda, lançando lanças e forcados ao chão, fugindo rumo a Varda, mas chocaram-se na escuridão contra a infindável parede de couraças e escudos de Vallen. Estas, dando a volta enquanto seu senhor os massacrava, postaram-se por detrás da colina, fechando-lhes a saída. Os que corriam a outras direções pelo campo eram rapidamente tomados pela cavalaria, em galopes que faziam a terra tremer.
Ao fim daquela noite, as forças de Varda haviam tombado: quinhentas e vinte e quatro almas pereceram, os corpos fendidos, queimados e estilhaçados. As tropas do Tigre, sem uma única baixa, avançavam rumo a uma capital desprotegida, queimando tudo em seu caminho. O visconde foi arrastado pelos calcanhares pelo cavalo de Bellignarior até sua cidade, a pele rasgada ficando pelo caminho num cru rastro carmesim, a carne esfolada e os ossos expostos num grito mudo que os céus testemunhavam.
As forças principescas, embora das mais valorosas e bem equipadas de todo o reino, em manobra fabiana evitaram o embate com a hoste de Vallen, que passou impune pelo principado em não mais que dois dias. Bellignarior, com o Tigre ecoando grave em seu peito, absteve-se de queimar ou pilhar Arquent, apressando o passo rumo ao seu intento, os cascos de seus cavaleiros fazendo a terra tremer em silêncio calculado. Alcançaram Martor, onde a condessa Alissande Marer havia auxiliado o visconde de Varda. Foras-lhe pressionada por seus oficiais a enviar auxílio, e assim, entre a espada de Vallen e o risco de um motim, optara pela saída que lhe parecera mais sábia: livrar-se dos amotinados, enviando os mais vocais ao combate que tanto clamavam. Despachou quinze cavaleiros e seus pajens, que jazeram com os de Varda no campo, os corpos fendidos e pisoteados na erva ensanguentada.
O condado de Martor era vasto, mas em especial inofensivo, sua riqueza brotando das vinhas excelentes que a condessa muito velava. Mulher prudente, mantinha alguns grandes fortes e castelos da era de seu primeiro marido em estado pristino, relíquias de pedra que guardavam o legado de um tempo mais belicoso. Produzia o condado o melhor vinho de todo Zephyros, mui apreciado até pelos bárbaros, elfos, anões e duendes d’além, negociado em Argonia por três peças de prata cada botija, cheia do viscoso sangue das uvas, rubro e espesso qual vida destilada. Foras agraciada com um rio caudaloso, que se ramificava por todo o reino e desembocava no porto de Erebo, permitindo que a produção vinícola escoasse com toda a presteza. Era, sem dúvida, um dos territórios mais ricos de todo o reino. 
Enviou uma comitiva, encabeçada por seu camareiro-mor, a esperar pelas forças de Vallen na fronteira do território, solicitando uma trégua. Declarou que sua senhora nada tinha contra o Tigre e que muito lamentava a perda dos pais e da irmã de Bellignarior, esperando encontrar na razão bons termos que a ambos servissem. O jovem conde, que até então nada tinha contra a condessa, ouviu o conselho de guerra com o Tigre ecoando grave em seu peito e consentiu, guiando sua hoste até um grande castelo que Alissande mandara preparar para a visita. Não deixou, porém, de enviar batedores a cobrir um largo raio em volta da força principal, olhos atentos que perscrutavam a terra como falcões, prontos a soar o alerta ante qualquer traição que a sombra do destino pudesse esconder.
Tal posição fora escolhida por astúcia: uma passagem secreta, oculta nas entranhas da pedra, permitir-lhe-ia escapar a algumas milhas dali caso a negociação falhasse. Dois fossos profundos, uma ponte levadiça, a dupla muralha alta e a cidadela, coroada por uma torre elevada que podia ser celada do exterior, garantiam-lhe tempo mais que suficiente. Tal obra defensiva, imponente e severa, pesaria no moral de Vallen e nos planos de seu jovem senhor.
Contava também com outras armas em seu arsenal para dobrar o conde. Embora experimentado na arte da guerra, Bellignarior era cordeirinho em outros campos igualmente poderosos. Assim, a astuta lady montou uma chegada suntuosa, com grande séquito a saudar, e abriu o mercado fora dos portões, especialmente carregado de vinho a preços baixíssimos, um regalo às tropas de Vallen que reluziam em suas cotas sob o sol. Convidou Bellignarior a entrar no castelo desarmado e despido de sua armadura para a entrevista. Seus companheiros tentaram dissuadi-lo, mas, voltando-se a um dos jovens mais efusivos em seus conselhos, disse com um tom grave que ressoava o Tigre:
— Tu, nobre Cassandro, já que tanto te preocupas comigo, vem comigo e guarda-me, se assim o queres. Mas lembrai-vos de quando estivemos em Nummus: acaso usámos armas contra os bárbaros?
E assim, vestindo apenas seu gibão de guerra — uma veste grossa de múltiplas camadas de couro e algodão negros, sob a qual usava a cota —, adentrou o castelo. Foi-lhe permitido que Cassandro portasse uma misericórdia ao seu lado.
A condessa o esperava à mesa, trajada em insinuante linho que se abria por debaixo de um manto esverdeado, a tez alva contrastando com os fios castanho-aloirados de sua farta trança. Mulher feita aos trinta e oito anos, não perdera a forma: de farto busto e curvas simétricas, sabia dobrar os corações dos homens com maestria. Viúva pela segunda vez, era mestra em extrair desse frágil ser — o homem comum, tão vulnerável ante o sexo oposto — tudo o que desejava. Dirigia-se, ademais, à frente de um grande aparato de inteligência, com espiões e informantes espalhados por castelos, solares e cortes, os olhos e ouvidos daquela senhora de trança longa que ali se apresentava, reclinada em ostentosa saudação.
Tomou-lhe a mão, tentando depositar-lhe um longo beijo, mas foi repelida pelo calor que emanava dos dedos dele. O orgulho, em facto, como bem sabia a condessa, era uma das maiores fraquezas dos mortais, mesmo entre os melhores dentre eles, os mais jovens especialmente vulneráveis a tal. O ego é algo brutal que os faz suplantar mesmo o Eterno em seus corações por si mesmos; desde o momento que acordam, dirigem suas forças a si ao invés de lembrar-se que vivem pelo Criador. Portanto, calculava ela refrear o temido cavaleiro negro por seu coração, desconhecendo não haver mais um nele, mas armas com que jogar não lhe faltavam, e o vinho seria grande aliado em sua mente.
Com as devidas apresentações, que Bellignarior deixou que Cassandro conduzisse por si, deram início ao banquete, despejando farta e contínua quantidade de vinho. Bellignarior fervia as taças de prata em suas mãos antes de tomar seu conteúdo ainda fumegante; se havia veneno, com o álcool se desnaturara e evaporara. Permaneceu em silêncio enquanto a condessa falava por todos os meios, até que, com o cenho franzido e uma risada, disse: — Não é mui cortês deixar uma dama a ouvir a própria voz, milorde.
E, perfazendo-se decepcionada, acrescentou: — Imaginava eu que tão renomado cavalheiro, não só em seu valor em combate, mas no trato que dirigia à irmã, perfazendo-a uma das mais felizes donzelas deste reino e circunvizinhanças, teria mais trato com as damas...
— Não tenho mais a quem dirigir-me, portanto alegra-te, milady, enquanto te escuto — respondeu ele pela primeira vez, o Tigre ecoando grave em seu peito.
Ela, com um gole de vinho, franziu o cenho, divertida: — Ah, não te irrites comigo, sou apenas uma tola mulher que o enfada. Devia ter-me apercebido de quão irrelevantes são meus assuntos perante tão elevada figura como vós, milorde.
Enquanto garantia que barricas e mais barricas fossem vertidas a ele, continuou a discorrer sobre outros tópicos, até que, julgando que ninguém manteria o juízo — por mais inumano que fosse — após quatro barris completos do mais puro e forte vinho de suas adegas, lançou-se a ele, assentando-se ao seu lado: — Pois então, vamos aos negócios. Em que posso ser útil a ti? E o que estás disposto a dar-me por esta ajuda?
Perguntou, tomando-lhe a mão. Ele, com um sorriso subitamente aquecendo-se, queimou a condessa na anca onde ela repousara a mão dele. — A vida! — trovejou o Tigre.
— Como és quente, milorde — disse ela, com um olhar insinuante a Cassandro, que em facto era belo e jovial, de longos cachos loiros rodeando-lhe a face alva e afilada. Volvendo à sua ponta da mesa, lançou: — Talvez o cavaleiro negro tenha um gosto mais peculiar pelas casernas...
— Apenas do sangue deles, embora a carne das mulheres seja excelente às chamas — respondeu ele. Ergueu-se, sinalizando que Cassandro se afastasse, enquanto o ar fervilhava, tirando fumaça da mesa e dos tecidos que a cobriam: — Te concedo a vida, e tu me darás tudo.
— Tudo? Tão repentinamente assim? Estou envergonhada, milorde! Vais tomar-me agora? — zombeteou ela, estendendo a perna sobre a mesa.
— As tropas. Me darás as tropas, bem como não tocarei em tuas terras, servos ou negócios, mas abater-me-ás com tributo.
— Já me encontro tributária de Sua Majestade, e pouco razoável me parece tal proposta — devolveu ela.
— Aliás, Sua Majestade mui em breve responderá às tuas aventuras. Portanto, que ganho eu abertamente me aliando a ti, se o machado real vier sobre mim depois?
— Que importa viver mais um pouco ou cerrar aqui? — bramiu o Tigre.
— Permita-me que eu lhe pergunte: estás indo a Telurian, eu bem o sei. Portanto, queres deter-te aqui enquanto as tropas reais se ajuntam com as forças do principado e todos teus inimigos te cercam, à frente por Telurian e às costas no principado, e caem sobre ti enquanto corres em massacre para garantir a lealdade de algumas centenas das minhas tropas? Terás de matá-los, pois se voltarão contra ti se tirares minha vida. Então não alcançarás teus objectivos, mas antes te arruinarás, afogado aqui em Martor. Mas, se este ainda é teu desejo, se queres em tua altiva glória ceifar a vida de uma mulher indefesa, eis aqui meu pescoço, despedaça-o! Já vivi o suficiente nesta terra ingrata e sobrevivi a dois casamentos; acho que devo estar grata por morrer por tuas mãos, ó mar de chamas.
Disse ela, aproximando-se e afastando a pesada trança, oferecendo o pescoço. Ele manteve-se quedo; ela ergueu-se e respondeu, adquirindo um tom maternal: — Como pensei. Portanto, meu querido tigrinho, ouve: eis que já te ajudei ao mostrar a tolice em que ias meter-te. Não posso auxiliar um conde rebelde, pois isto és contra o rei, meu senhor, muito menos sem nada ganhar com isso. Mas façamos assim.
E, batendo as palmas, uma de suas servas, bela morena alta e bem vestida, de tez alva como a neve, apresentou-se: — Esta é Beatriz D’Hirson, uma de minhas mais leais serventes e mestra em ‘obtenção’ de informações. Enviar-te-ei, por ela e por outros que indicar, presentes com informações sobre os que buscas, mas que isto não saia de entre nós. Caso venças, desejo todo o d’além-rio e que Martor se torne um pariato; caso percas, nada ocorreu entre nós. Mas minha vida, terras e tropas ficarão intocadas em ambos os casos. Que achas?
— Joguemos por ora como queres. Entanto minhas serão as tropas quando eu retornar e por fim não há perdão aos iníquos, senhora — respondeu ele, o Tigre ressoando grave, enquanto saía ruidosamente pela porta, lançando em chamas as tapeçarias e quadros.
— Então eu devo arder — devolveu uma cansada condessa, antes de cair, suando, em sua cadeira, enquanto suspirava e nos agradecia por seu plano ter surtido efeito a um preço menor do que imaginava. Voltaremos a condessa quando os pesos de seus voto e pecados lhe for cobrado.
Avançou, pois, sem maiores dilações a Telurian. Os condes de Telurian e Ravenshade, vizinho deste, antecipando-se, ao receberem as cartas da já inexistente Varda, reuniram não pequena força. Levantaram seus estandartes e usaram todas as suas ligações: genros, sogros e quem quer que lhes devesse algo ou lhes fosse ajuramentado foi convocado. Como o caminho entre Vallen e Telurian não fosse menor, em marcha acelerada a um exército que três meses, com as forças de Vallen demorando-se um pouco mais a reabastecer-se em Martor, conseguiram ajuntar não pouca gente de Zephyros e de fora. Primos acudiam de todos os cantos, e reuniram-se, pois, a estes dois conspiradores não menos que os três barões iníquos, a saber: o de Taldoria, o de Glynndale e o de Ardenfell. Eram os que se ajuntavam assim, sem saber, para uma única vindima, a grande parte dos inimigos de Bellignarior num mesmo lugar.
Dispuseram-se em três tropas com uma vanguarda partilhada, composta por quinhentos cavaleiros, dos quais duzentos foram arregimentados dos bárbaros do oeste por trezentas peças de ouro. Seus cavalos, menores, mas mui mais ligeiros e leves que os dos cavaleiros tradicionais, voavam como plumas pelo campo de batalha, distribuindo dardos e flechas com precisão aos peitos inimigos. Daí se inspiraram os elfos, que aprimoraram tal arte com sua perícia e força descomunal ao entesar o arco, conhecidos de Bellignarior desde a hoste do rei contra os bárbaros e elfos negros. Ademais, mil besteiros, três mil de infantaria — um terço destes infantes pesados, couraçados em suas brigantinas, enquanto os demais se contentavam com cotas mais leves e bacinetes sem viseira —, e, por fim, cento e cinquenta arqueiros.
Seus acampamentos haviam sido fortificados e esperavam por Vallen depois do rio Padus, num trecho que, embora largo, não era mui fundo, dando nas coxas dos que tentassem atravessá-lo. A correnteza, porém, dificultava grandemente tal façanha a homens armadurados, carroças, cavalos e vagões de suprimentos. Portanto, se Vallen decidisse cruzar, seria cravejado pelos besteiros, arqueiros e magos, enquanto a cavalaria e a infantaria se encarregariam dos que lograssem alcançar a margem, o rio levando-lhes os corpos e as armas. Inda outra vantagem se impunha: a menos que transpusessem a margem, seus acampamentos estavam fora do raio de ataque dos trabucos e onagros. Dispuseram batedores ao longo de toda a riba a vigiar, de forma que uma travessia noutro lugar lhes fosse avisada com antecedência.
Ao chegar à margem do Padus, Bellignarior ordenou que o acampamento fosse levantado ali mesmo, encarando os que vinham por Telurian. As tropas saíram e perfilaram-se umas ante as outras por dois dias seguidos, com algumas poucas escaramuças seguindo-se entre os leves, que atiravam projécteis uns aos outros, nunca se engajando em verdade. Com poucas baixas, retiravam-se. Chegou-lhe no anoitecer do segundo dia notícia por d’Hirson, confirmada por seus batedores, de que a hoste real fora levantada e já atravessava Martor sem oposição. A condessa mantinha-se “neutra”, e, com as forças do principado que se haviam somado a elas, parte fora lançada contra Vallen, sitiando muitas das fortalezas que por ora resistiam. Deixando uma parte das tropas entregue ao cerco, os demais avançavam contra ele com seis mil homens, dois mil destes de cavalaria. Via-se, pois, cercado: quatro mil, seiscentos e cinquenta pela frente, e por trás outros seis mil. Estava em desvantagem de três por um, e nem se falava da cavalaria, que se via grandemente superada. Não tendo tempo a prolongar o jogo de desgaste, colocou-se a procurar outras sendas, enviando batedores por toda a extensão do rio.
Tornaram a ele com novas de que, ao sul dali, parecia haver um grande lago, que, por sua largura, não era vigiado pelos telurianos; a terra, porém, num certo ponto, não se mostrava mais distante que quinze braças. Indo até o local, confirmou tal dito e ordenou que a infantaria e a cavalaria saíssem e se perfizassem ante o inimigo, como haviam feito no dia seguinte, e que os arqueiros se lançassem aos bosques e faias próximas, cortando todo o lenho que encontrassem e trazendo-o ao acampamento, aos olhos confusos dos telurianos. Ao anoitecer, dispôs piras ao longo de todo o acampamento, por detrás da enseada onde as tropas se apresentavam, e incendiou-as, cobrindo com fogo e fumaça a vista dos do outro lado sobre o que se passava. Com isso, dedicaram-se a caçar espiões, com grande êxito, pois dois ou três foram enforcados na margem, à vista de seus companheiros, por quatro dias seguidos, enquanto os carpinteiros trabalhavam sem cessar num lugar reservado. Nestes dias, ensaiaram assaltos em plena noite, vindo por detrás do fogo e ocultos por sua luz ao alvorecer.
Ao quinto dia, recebeu uma libré do rei com um ultimato: Vallen deveria baixar as armas, entregar o comando de suas forças sem luta ao senescal do rei, e as fortalezas renderem-se; o próprio Bellignarior, despido de armas e armadura, devia apresentar-se com seus jovens conselheiros à autoridade real e sujeitar-se à justiça do rei, só assim não seriam massacrados. Bellignarior, à vista do mensageiro, ordenou que preparassem novas paliçadas no forte e montassem os onagros e balistas para receberem Sua Majestade, e assim o despachou. Em alta madrugada, com as piras acesas e iluminadas, os telurianos esperavam, ansiosos, a habitual fanfarra de seus oponentes, com o ataque ensaiado ou real, vigiando atentos de seus postos, pingando cansaço. Bellignarior ordenou que se fizesse como antes a apresentação ao dealbar do dia, adicionando tambores ao espectáculo, mas um pouco mais cedo. Enquanto isso, dando a volta por detrás do acampamento, levou consigo seus cavaleiros e arqueiros, lançando-se silenciosamente, coberto pela noite escura, ao lago, a algumas milhas dali. O que haviam trabalhado era um conjunto de barcaças que se ligavam umas às outras, e, assim conectadas, recebiam pranchas acima de si, montando uma ponte rápida e improvisada, de largura bastante a um cavalo com seu cavaleiro.
Durante a primeira e segunda vigília da noite, trabalharam sem cessar, iniciando a travessia na terceira. Mas já era pela quarta, e o dia ameaçava raiar, com os tambores e a algazarra ouvindo-se no acampamento, quando se deram conta de que estavam numa ilha, inda distante da margem. Em desespero e fúria, puseram-se a montar a ponte da ilha à verdadeira margem. O sol elevou-se sobre eles, revelando-os ao iniciar a travessia. Os batedores telurianos não demoraram a tomar nota e avisar suas forças. O barão de Glynndale acorreu com sua tropa de cavalaria, uns cem ao todo, à margem do lago, seguido por metade das forças telurianas, deixando os besteiros e cavaleiros leves a vigiar a margem do acampamento.
Os cavaleiros foram recebidos com certo pavor pelas forças de Vallen, mas Bellignarior, lançando-se com seus companheiros, segurou o avanço inicial de Glynndale, dando tempo aos arqueiros para constituírem linhas. Assim que os cavaleiros do barão fizeram nova carga, foram martelados por todos os lados com flechas pesadas, que lhes quebravam as costelas e trincavam os crânios, a despeito das armaduras. Não poucos cavalos caíram, e, cessada a chuva de setas, a cavalaria valleniana caiu sobre eles, recuando apenas quando o restante das tropas lhes veio em socorro.
Por um momento, os vallenianos viram-se prestes a serem lançados ao lago, e muito já se entreteciam com tão mal fado em sua primeira grande batalha. E não fosse por nós teriam perecido, recebendo forças do alto Bellignarior, ardendo, lançou-se com seu penacho vermelho-sangue entre as linhas inimigas, e seus homens, ao verem tal, lançaram-se enfurecidos atrás de seu senhor. Não poucos arqueiros demonstraram naquele dia a força que a arte da arquearia concede a seus praticantes, descendo suas lâminas sobre os inimigos com o peso de martelos, fendendo capacetes e arrancando braços. Por quatro horas seguiu-se cruenta peleja, e Bellignarior ardia, erguendo uma torre enxameada no meio do campo, consumindo em cinzas os inimigos dentro de suas couraças e cotas, que caíam ao chão derretidas, enquanto seus portadores se desfaziam em carvão dentro delas. O solo tornou-se cinzento, e não se podia andar senão por cima do metal das couraças, jaquetas e elmos dos caídos.
Avançaram assim, aos poucos, pelo flanco até o lugar onde estavam os acampamentos. As forças telurianas, que haviam ficado de guarda contra os de infantaria, lançaram-se a ajudar seus companheiros, que eram empurrados de volta. Aproveitando tal, as forças de Vallen que haviam ficado no acampamento lançaram-se, atravessando o rio e cercando os de Telurian, incendiando-lhes os acampamentos. A peleja consumiu-se até o entardecer, com muitos fugindo do lado de Telurian e não poucos sendo capturados, a saber, mil e trezentos. Dentre eles, o barão de Taldoria foi um dos calcinados em batalha; o de Glynndale foi esmagado pelo próprio cavalo, mas Bellignarior fez questão de que o decapitassem. Junto com o barão de Ardenfell e os condes de Telurian e Ravenshade, que haviam sido capturados, foram despedaçados quando apresentados perante ele em sua tenda, ante os olhos do conselho. Queimou-lhes os corpos e, após tomar-lhes os corações, enviou-os ao rei, que ainda estava em Martor com suas forças, com a seguinte mensagem: — Ainda faltam alguns. Escolhe bem o que farás.
Quanto ao restante das tropas inimigas capturadas, em horrenda brutalidade, ordenou que fossem presas dentro de um dos acampamentos. Subindo numa das torres, a tudo incendiou, numa versão menor de Nummus, os gritos ecoando até os céus cinzentos com tanta fumarada enquanto ele se entregava a seu deleite cruel, enebriado com o cheiro, o sabor de suas vítimas.
Mas não poucas foram as marcas que aquela batalha lhe impôs. Seu corpo estava inda mais marcado que nas suas justas e torneios; recebera dezenas de golpes dos inimigos, e sua armadura, embora intacta a tais golpes comuns, transferira-lhe boa parte dos impactos. Magia comum pouco lhe podia fazer, e, sem ela, havia de aguentar a dor e volver seu ombro deslocado ao lugar por si, em excruciantes rugidos que ecoavam por todo o acampamento. Embora não houvessem logrado cortá-lo, sangrava em mais de um lugar; o sangue, desnaturado, colava-se à pele, dando-lhe um vermelho escuro que se impregnava a ele, e nem a água o podia tirar.
Com suas tropas exaustas e desbastadas, pois caíram de Vallen duzentos e quarenta e sete naquele dia, e ele mesmo em não mui boas condições, decidiu prosseguir com o embuste para evitar as tropas do rei, seu senhor, que estavam a dois dias dali. Para tanto, ordenou que suas forças se separassem em dois grupos, deixando as tendas e parte das tranqueiras no acampamento, enquanto alguns fogareiros seriam mantidos acesos, dando assim a impressão de que inda ali estavam quando as tropas reais chegassem. Enquanto isso, ele aguardaria a investida real, acendendo o betume que haviam trazido para os projécteis, espalhado pelo acampamento, causando o máximo de baixas e dando-lhes tempo de se aprofundarem em Telurian. Tal obrigaria a hoste real a dividir-se para persegui-los ou ir atrás de um dos corpos menores e mais ágeis que ela, sendo assim despistada numa caminhada infrutífera. Decidira usar a mesma táctica de terra arrasada dos bárbaros contra as tropas reais, tomando o que podiam e incendiando o resto, dando a volta no condado enquanto retornavam a Vallen para expulsar os invasores. Ele, por sua vez, avançaria até a capital, reencontrando Cassandro, que partiria à sua frente, levando consigo parte dos arqueiros e os trabucos até a capital de Telurian. Assim que a reduzisse a cinzas, reunir-se-ia com suas forças novamente em Vallen.
O plano seguiu-se em perfeita simetria: os couraçados reais lançaram-se bravamente ao acampamento, cortando as cordas das tendas e atacando as balistas com suas maças, apenas para arderem na presença do cavaleiro negro, que se ergueu da muralha e a todos queimou. Grande perda teve Zephyros naquele dia, com o marquês, que quase lhe fora genro, perecendo com muitos outros de nobre nascimento. Tentaram alcançá-lo, mas ele já se lançara a todo galope para o outro lado do rio, e quem se avizinhou dele enxameou-se. Os projécteis não o detiveram. Assim rebelara-se finalmente aos olhos do rei, afastando-se, qual mancha negra no horizonte, da vista de seu antigo senhor e companheiro de caça. Este não pôde conter a tristeza ao pensar que seu mais leal executor ora se tornava contra o reino. As tropas reais detiveram-se a sepultar os caídos de Telurian, muito condoendo-se com tamanha carnificina.
Alcançou, pois, Bellignarior a capital de Telurian com seus homens e, após cinco dias de assédio, a filha do conde, com lágrimas nos olhos e muito o injuriando, veio render-se. Sua espada ia cair sobre ela e sua mãe quando seus companheiros se lançaram à frente. Cassandro foi atirado ao longe, enquanto o Tigre, ardendo em seu âmago, queimava as pobres mulheres. O jovem retornou, lançando-se sobre seu senhor e sendo esbofeteado em pleno ar; ainda assim, logrou salvar-lhes a vida. Bellignarior lançou Telurian em chamas, abandonou Cassandro ali — já que tanto queria cuidar das duas “meretrizes” — e seguiu, bradando aos seus companheiros que, se tinham amor à própria vida, nunca mais fizessem tal arte.
Tornaram incólumes, dando a volta à hoste real e passando por Martor. Não puderam, porém, reabastecer-se tão vultuosamente como antes, ora que eram inimigos declarados do reino. Mas, com uma pequena encenação na qual a condessa se mostrava, a Deus e ao mundo, obrigada pela espada do cruel cavaleiro negro a fornecer-lhe suprimentos, lograram alcançar o principado, rompendo as tropas principescas que tentaram barrá-los — quinhentos ao todo. Estes não os perseguiram ao fim, e, evitando as fortificações, apressaram-se a Vallen, contentando-se em queimar os campos vizinhos à estrada, nada além disso. Retornaram no vigésimo nono ano natalício de Bellignarior a Vallen, onde já ninguém encontravam no campo. Os camponeses que haviam escapado à pilhagem e ao assalto da hoste real tinham-se trancafiado nos castelos ou fugido a territórios vizinhos. Tudo era cinzento, e em seu caminho apenas a visão das chamas de quando fora combater os barões o acompanhava, enquanto cavalgava à frente de suas tropas — embora ora fosse uma mescla de sua visão e da realidade.
Seguiram assim até Mortis, o primeiro grande forte sob ataque real. Enviando os “mensageiros” da dama d’Hirson, conseguiu contactar o bailio que comandava Mortis, um barão leal a Vallen. Combinaram um ataque nocturno conjunto: a guarnição sairia do forte ao mesmo tempo que Bellignarior e suas forças caíam sobre os quatrocentos que os sitiavam. O massacre foi total, e muitos foram lançados ao fosso. Prosseguiram, libertando Vallen das mãos lealistas por pouco mais de um mês. Nesse tempo, ajuntaram-se a ele, com suas forças, alguns lordes descontentes com a coroa, que se punham à disposição de Vallen. Buscavam, porém, usar o Tigre para seus próprios intentos. Muito erraram nisso, pois foram obrigados ao juramento légio de sangue; os que recusaram foram assados vivos pelo toque de Bellignarior, que os desafiou por seus títulos e tropas. Juntaram-se assim às forças de Vallen uns cinco mil homens, com os quais libertou a capital, pouco antes que o desesperado rei alcançasse Vallen com suas hostes.
O Arcebispo de Vallen acorreu a aconselhar um fim aquela loucura, e que com toda aquela mortandade tudo o que conseguia era lançar-se mais próximo a seu macabro fim, repetiu-lhe pela quinta vez a profecia e implorou que cessassem as agressões que já se havia provado forte e valoroso e que agora poderia negociar em pé de igualdade com sua majestade e que a igreja intermediaria a paz. 
- Fim? Que ele venha, pois, meu pai, não tenho mais por que teme-lo, mas de uma coisa podes estar certo só poderei me reunir a ela quando puder me apresentar ante ela com o coração de todos os que a violaram.
E assim rechaçou o pobre e velho Arcebispo, que viu o destino desses dois jovens desde seu início e não veria seu fim, pois ele morreria mais tarde inda aquele ano, e Bellignarior acorreu a indicar um de seus jovens companheiros ao cargo e por um pouco de pressão aqui e dinheiro ali agora o Tigre tinha o apoio da Santa madre Igreja, e assim toda uma hoste de novos cavaleiros devotos lhe engrossaram as fileiras o próprio erguendo-se em manto cardinalício, e com tropas bem abastecidas e supridas pelos empréstimos que a igreja lhe ajudara a negociar, montou fabulosa força, mais de quinze mil ao todo, esmagando as forças reais batalha após batalha as lançando ao norte, veio a lançar-se pessoalmente as duas vilas onde os campônios que haviam ajudado por poucas moedas de bronze a conspirata apenas para descobrir que cinco deles haviam morrido, dois de fome e três nas pilhagens da hoste real enfurecido queimou lhes as vilas e alcançando o ultimo imolou-o na praça. 
Restava-lhe ora lançar seu olhar sobre os elfos, os viscondes que tinham suas terras ao norte do reino e o burguês. Com a ajuda de Beatriz e da rede da condessa — que recebera enfim suas terras e seu pariato, embora insignificante fosse sua voz no conselho —, o Tigre só se voltava aonde tivesse inimigos a esmagar. E inimigos teve, pois muitos se levantaram contra ele por sua ilegitimidade ao trono, ainda que nunca o tivesse reclamado, o que em muito piorou as coisas. Certo dia, indagado acerca disso por Marer, tomou a coroa da qual despojara o rei e, lançando-a, disse: — Já que tanto te importas com isto, por que não te tornas rainha?
Mas, por evidente temor de seu futuro “vassalo” e actual senhor, ela não aceitou a oferta. A bela d’Hirson era a única, além do mordomo — que acompanhava em todas as questões seu senhor, a quem vira crescer e ocupava o lugar de chanceler deste, sempre presente e aconselhando-o —, que parecia lograr manter uma fala não monocórdica com o Tigre por algum tempo. Ficava com ele semanalmente, enquanto ele, sentado e ardente, apertava o medalhão com o cabelo de Alfionora nalgum lugar ou planeava sua campanha contra o Norte e os elfos. Deixava-a falar livremente sobre a inteligência que lhe trazia, e nesse ponto ouvia-a com atenção. Ela introduziu outros assuntos a estes relatórios e, aos poucos, era quem mais sabia o que se passava na mente de Bellignarior, mas sempre repelida quando tentava abordagem mais ousada. Não a cortava totalmente, porém. 
Zephyros tornara-se um país militarizado em extremo: suas academias, fazendas, tudo acinzentado e volvido ao esforço de guerra. Não havia tropa mais bem equipada, dos pés à cabeça, que os de Vallen — pois ainda assim se chamavam —, que passaram a pintar suas armaduras e escudos de negro em homenagem a seu comandante, que sempre se lançava em todas as maiores batalhas a arder na vanguarda.
Entanto, a guerra lhe pesava, e os combates com o rei e os lealistas o haviam ferido grandemente. Andava a mancar, e os jorros de magia já não lhe saíam tão facilmente, vindo mesmo a cair desfalecido após suas enxurradas de chamas. Deu-se conta de seu mau estado quando, num combate contra parte restante da força real, lançando-se aos flancos com sua cavalaria, como sempre fizera, viu-se atingido por meia dúzia de piques que o içaram da sela. Não se importando com isso, pôs-se a queimá-los e a elevar-se no ar; em verdade, explodiu como de costume, mas, preso pelas esporas aos estribos, desfaleceu após usar a magia e caiu, sendo arrastado algumas milhas, envolto em seu manto negro, pelo cavalo. Este, em passo comedido, por saber seu amo ainda preso às ancas, andou com a leveza que lhe era possível, afastando-se do campo de batalha. Tal muito assustou os homens de Vallen, que não mais encontraram seu senhor.
Ele veio a dar-se num campo de uns pobres fidalgos do campo, que possuíam um solar não mui bem apessoado, mas viviam o melhor que podiam. A mais nova das filhas, garotinha falante de cinco anos, encontrou o grande cavalo e seu igualmente enorme cavaleiro enquanto brincava pelo campo. Bellignarior acordou, tendo seu capacete puxado da face, mas preso a ele pelas amarras. Tentou erguer-se de imediato, mas o esgotamento lançou-o de volta ao chão, e o peso de mais de cento e dez libras, que portava desde os dezasseis anos sem nunca se aperceber, parecia finalmente liberar aquele fardo ignorado por anos, com juros sobre ele. Ficou ali estatelado, enquanto a garotinha lhe tamborilava no capacete e o enchia de perguntas. 
Ele apenas se deixou martirizar, até que alguém, vindo ver a criança, o encontrou e, chamando por ajuda, dois servos o carregaram para dentro da casa. A esposa do baronete reconheceu com horror o cavaleiro negro de penacho vermelho queimado, que jazia desmontado numa de suas cadeiras. Esperou o marido voltar do campo, que, igualmente espantado, pôs-se a interrogar a mulher em alta voz sobre como o revoltoso conde, bispo, “rei” de Vallen estava em sua sala de jantar, não atentando ao cavaleiro que já se levantara e se postava atrás dele. Os baronetes gritaram horrorizados, lançando-se-lhe aos pés. Ele, com um gesto, pediu água e, após comer um pedaço de veado que lhe serviram, sob o olhar temeroso e ansioso por agradar de toda a grande família dos fidalgos, caminhou até a garotinha que o encontrara. Diante da família horrorizada, que temia ver sua criança partida ao meio por aquele tão famoso por tal façanha, ele, dando-lhe um afago na cabeça como fazia à Loba, deteve-se após um longo olhar. Sentiu entre os dedos, uma última vez, o peso, a cor e o fulgor do medalhão prateado, onde a mecha do cabelo branco de Alfionora reluzia. Com um suspiro e seu primeiro sorriso em muito tempo, entregou-lho e saiu pela porta sem dizer mais palavra, perante os lívidos coitados assustados que ali estavam.
Ao retornar ao castelo, decidiu que havia de solver seu malefício mágico e o estado de seu corpo destroçado. Ora, não mui distante de Telurian, num alto desfiladeiro que fendia os céus, habitava um grande dragão dos tempos primevos. Por milénios, a fera alada, de escamas esbranquiçadas qual neve envelhecida, reinara sobre os seus, e, no último milénio, fizera ali seu covil, uma gruta de sombras profundas. Bellignarior mergulhou nas trevas do antro da besta, que, com seus poderes mentais aguçados como lâminas, logo identificou o intruso em seu leito. Com voz grave, que ressoava pelas abóbadas da caverna qual trovão ancestral, indagou: — Que tenho eu contigo, Tigre? Abatido estás, sem dúvida. Buscas um pacto? Que me poderias oferecer além da destruição inevitável de ti mesmo, que carregas como sina?
Ele permaneceu lacónico, o silêncio cortante qual espada desembainhada, até postar-se face a face com as ventas do grande dragão. Este baforou-lhe um sopro quente, mas o Tigre, ardendo em seu âmago com uma chama que suplantava tal calor, não se dobrou. — Destruição te ofereço! — foram as únicas palavras de Bellignarior, proferidas com um rugido feral.
Com uma lança que ocultava às costas, imprevista pelo dragão — pois, ainda que seus poderes mentais sondassem as mentes e corações de homens e feras, no Tigre havia apenas chamas, trémulas, é verdade, mas inda assim chamas —, trespassou-lhe o pescoço. A ponta de adamantita, forjada com esmero para abater dragões na guerra dos barões, saiu-lhe pela boca acima. O grande antigo debateu-se em fúria titânica, lançando colunas de fogo que fizeram tremer sua cama dourada. Moedas e pesados siclos voaram com força, qual tempestade de metal, a todos os lados. Mas Bellignarior, cavaleiro calejado, firme em sua montaria pouco usual, cravou-se ao pescoço da fera. Com um golpe brutal, fincou a lança num dos olhos do dragão, imbuindo-a com todo o seu poder mágico. A besta implodiu de dentro para fora num turbilhão de chamas, o ar enchendo-se do cheiro quente de carne de ave queimada.
Em suas últimas forças, cortou-lhe a jugular, banhando-se no sangue que jorrava em torrentes rubras. O sangue de um dragão — inda mais de um tão antigo e sábio, reconhecido por suas virtudes medicinais que elevam os mortais a quase invulnerabilidade e ampliam o poder mágico a um abismo insondável — não vinha sem preço. Para Bellignarior, o custo foi seus pelos espessarem-se em cerdas vermelhas, duras como aço por todo o corpo; suas mãos estenderam-se e engrossaram, adquirindo o aspecto de garras; sua tez, já rubra, tornou-se ainda mais vívida; seus dentes caninos alongaram-se, e seus olhos, a partir daquele dia, sempre brilharam, enxameados de magia, com relâmpagos a correrem-lhe as íris. Cada vez menos humano e mais felino, erguia-se ele, causando não pequeno espanto e arrancando gritos até dos que lhe eram mais chegados. A única que nada pareceu importar-se, pedindo-lhe para ver os dentes e tocando-lhe os pelos com particular entusiasmo, foi Beatriz, que o enfadou com tal ousadia, sendo “gentilmente” expelida de seu escritório. O mordomo tinha a certeza de estar servindo, desde sempre, a um demónio — e ora a um demónio invulnerável.
Na alienação de seu soberano, que pouco se importava com a administração do reino e apenas se preocupava com quantas tropas estavam em prontidão, quais suas posições, haviam-se checado as fortificações, concluíram-se as muralhas que ordenara contra os bárbaros — que lhe serviriam de catapulta contra estes —, onde estavam seus arneses, alabardas e escudos, quantos conscritos se haviam juntado às hostes e onde estavam os inimigos, não poucos enriqueceram-se. Vermes havidos lançaram-se a engordar-se no Tigre, mas as chamas não se deixam parasitar, e logo o descobririam.
Por ora, mil delins aqui, a um “leal servidor” que fizera favor escuso a um dos conselheiros; trinta mil linus reais de ouro dos tributários esvaiam-se sem destino certo; um cento de bacias de ouro e prata, tomadas ao inimigo, mudavam prestes de mãos ou iam parar nalgum cofre obscuro. Os oportunistas refastelavam-se na riqueza da pilhagem, alimentando-se das infindáveis vitórias de seu lorde. O negócio da guerra, dos mais custosos, tornava-se, em bons ventos, a certos agentes, um dos mais lucrativos. O povo via-se em dificuldade; o comércio lutava para manter-se abastecido, e uma alfarroba de farinha custava verdadeira fortuna. Muitos dos jovens, que formavam a linha de frente nos campos, docas, construções, comércio e transporte, haviam desaparecido de seus lares, encontrando seus leitos nas casernas, entre couraças bem lustradas.
Bellignarior, enquanto isso, quando não estava a cair sobre um suspeito de auxiliar na conspirata contra sua adorada irmã ou a esmagar uma das inúmeras revoltas que estouravam aqui e ali — tamanha era a desordem político-económica que se via em Zephyros e já se espalhava às redondezas, com Argonia e Nebulin enviando tropas para a fronteira —, lançava-se a treinar suas novas divisões. Ordenava que corressem em equipamento completo por horas a fio, marchassem em formação com suprimentos para três semanas de campanha e entrassem em posição defensiva ao soar da trombeta. Isso quando não se lançava à cavalaria, obrigando-a a ensaiar e repetir até à exaustão, dia e noite, sob chuva ou neve, combate montado ou desmontado. Calejava-os muito além do que a guerra jamais os calejaria nestes treinos.
A ordem do treino com arco aos domingos a todos os homens do reino fora imposta, e os arcos eram mantidos em guarnições em cada vila e cidade. Assim possuía uma força massiva de infantes, besteiros, lanceiros, cavaleiros e arqueiros, dando especial ênfase nestes últimos, de quem muito se agradara pelo feito da travessia do lago em Telurian. Na presente conjuntura, apenas uma força combinada dos cinco grandes reinos poderia rivalizá-lo. Até a guilda dos aventureiros se via sem seus membros por aquelas bandas, pois quem quer que tivesse aptidão ao combate recebia uma tabarda de Vallen. Subjugou e acrescentou às suas hostes mais de duas dezenas de bestas, entre wiverns adestrados e behemotes.
Finalmente viu-se em disposição de lançar sua campanha ao norte, para punir o elfo, os bárbaros e o burguês que, segundo as novas de Beatriz, se refugiara em Aquanara, cidade portuária onde um belo príncipe meio-elfo, ao lado de sua adorável esposa humana, governavam em abastança e paz. Tal fugitivo viera das terras do tio de Bellignarior, barão de Porto-Fáilte, de onde procedera sua mãe, a condessa já falecida, e onde primeiro o comerciante buscara refúgio. Deixou a administração de Zephyros e das terras conquistadas a Marer, decana do conselho, e já ia em marcha com suas hostes quando a condessa Alissande enviou um pedido urgente de ajuda, pois irrompera violento motim na capital, e mais de trinta barões se voltavam enfurecidos contra o conselho. Deu meia-volta com suas forças e, após suprimir a rebelião — façanha que logrou em seis meses —, apressou-se a retornar à sua campanha de vingança.
Decidiu, por fim, investigar o que lhe causava tantas revoltas, estabelecendo inquérito ao conselho e à assembleia real. Muitos tentaram fugir e questionar a autoridade do inquérito, mas, assentando-se pela primeira vez no trono real, pediu que quem tivesse algo contra o inquérito desse um passo à frente. Saíram assim das laterais oito dos lordes conselheiros e da assembleia uns trinta, sob o olhar aflito da condessa Marer, que lhes gesticulava negativamente com a cabeça. 
Ordenou, pois, que uma lista, que pedira a d’Hirson numa de suas entrevistas semanais lhe preparasse, fosse lida em alta voz pelo Arcebispo, que colocara no lugar de seu antigo preceptor. Que com sua voz solene e alta preenchendo as abóbodas iniciou, sua leitura. A lista era infindável: castelos e cargos a amigos e parentes; destituição, confisco e má versação do tesouro e terras de barões e cidadãos; uso das forças para pressão sobre as guildas; taxas abusivas, sem o devido registo, impostas ao mercado, cujas rendas iam aos mais diversos apadrinhados de grande parte dos que se haviam apresentado. Chamando por nome, mandou que mais três, que não se demonstraram contra o inquérito, se apresentassem.
Ergueu-se do trono e ordenou que barreiras mágicas fossem erguidas em volta do átrio, onde aqueles condenados já começavam a desesperar-se em suas vestes, atirando as culpas a Marer, ao conselho de guerra — que se constituía maiormente dos jovens cavaleiros —, e por fim ao chanceler, que era seu mordomo. Todos infinitamente culpados por tamanha desordem, por terem deixado tão fáceis, e até de forma convidativa, tantos recursos. Suas acusações não eram de todo infundadas contra um dos que acusaram, mas o Tigre ignorou isso por ora; não convinha que a sombra fosse exposta ainda, e sua medida havia de encher-se inda mais.
Seguiu-se o esperado: uma enchente de chamas, inda mais brutais que as antes vistas do Tigre, derramou-se sobre os acusados. Seus mantos de peles e vestes foram consumidos em igual velocidade que seus ossos. Os magos, por mais que lutassem, falharam em conter as labaredas, e, não corressem todos do grande salão, teriam perecido. Saíram dele em ruínas fumegantes, Bellignarior à vista do povo que se reunira do lado de fora e dos nobres restantes que haviam corrido a salvar-se ali. O povo é presto a bramir contra, como a ovacionar, quando pensa que seus opressores tombaram; assim, para eles, o Tigre erguia-se qual justiça encarnada. Entre aplausos à sua carnificina, saiu dali. A condessa Marer pediu licença do conselho e retornou a Martor, para nunca mais de lá sair. Deixou Beatriz livre a atender o Tigre, pois a senhora tivera demais de tudo aquilo e, embora houvesse tentado e por um tempo logrado poder, não pudera obter o verdadeiro domínio sobre o verdadeiro poder. Em verdade, tinha pesadelos com aquelas chamas, dedicando o resto de seus dias assombrados a cuidar, o melhor que podia, de suas terras.
Tal façanha, porém, custou-lhe um atraso de um ano, que levou a reorganizar Zephyros, provisionar e dar repouso às tropas, sob o olhar constante da sombra que se mantinha qual chaga infecciosa no coração de Vallen. Beatriz não podia estar mais feliz: Bellignarior concedera-lhe boa parte dos encargos administrativos ao lado do mordomo, embora ela sempre vencesse por ser mais enérgica que o velho. O Tigre mostrava-se-lhe indiferente às decisões, desde que o mantivesse informado de cada passo que seus inimigos do norte realizavam. Passou aquele inverno no castelo de Vallen, vagando sobre as muralhas como o conde, seu pai, outrora fizera. Seus únicos momentos de quietude eram quando, vindo da livraria onde gastava bom tempo, ia ao quarto de Alfionora, que permanecia trancado. Lá punha-se a ler numa mesinha onde sua irmã costumava escrever, e que inúmeras vezes a vira ali. Achava graça nas marcas das chamas no portal, encontrando um pouco de paz a reler os arquivos de Vallen e os escritos do velho Arcebispo, que, em inúmeras cartas e teses, dedicava sua mente aos gêmeos.
Beatriz o rondava em suas leituras, muitas vezes com ele mui pouco ciente de sua presença. Muito esforço havia ela de dedicar para fazer-se notar por aquele grande tigre de amplo peito, pelos avermelhados, face brutal e antebraços largos, que saía de seu momento de introspecção qual felino deitado, repousando propositadamente alheio a quem o cercava, com a altivez que só os gatos possuem em esnobar. Lançava-se, pois, ávida, a esquadrinhar e vigiar os alvos de seu amado sire, pois ela o amava. Aproximara-se por ordens de sua senhora, tentara fisgá-lo. Não percebia que, ao intentar armar-lhe cilada, fora ela própria quem se tornara dependente dele. Não vivia senão para o momento de se encontrar com Bellignarior, para logo viver da lembrança e da espera. Por aquele fascinante e brutal Tigre, atendia à sua ânsia feminina, pois os homens buscam o poder, enquanto as mulheres buscam o poder sobre o poder. Ali se iludia a bela d’Hirson. Há mais mulheres do que se pensa que gostam de monstros.
Na primavera seguinte, erguendo os estandartes carmins cardinalícios, que agora ostentavam as armas de Vallen, lançou-se, deixando um de seus senescais a cuidar da ordem interna, a fim de evitar repetição da campanha tolhida pela revolta. Com doze mil, partiu rumo ao norte, lançando-se contra os bárbaros e, após, sobre os elfos, que, em suas belas cidades arbóreas, com barreiras e muralhas mágicas, pouco puderam contra as infindáveis couraças que se abatiam sobre eles. Mesmo suas falanges, tidas por invencíveis, mesclando arqueiros e infantes, viram-se surpreendidas, pois o inimigo usava táctica semelhante, apoiada por bombardeio constante de artilharia que lhes fendia as formações.
