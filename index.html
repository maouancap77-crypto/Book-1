Ora, Bellignarior dispunha-se em campo de batalha, na maior parte de seus combates, da seguinte guisa: a vanguarda era composta por duas linhas de infantaria, seguidas de uma linha de besteiros e duas de arqueiros, ordenados em blocos de cinco em profundidade e vinte scutuns em largura. Costumava abri-los, lançando a segunda linha à frente para envolver completamente os inimigos, mantendo logo atrás destas primeiras unidades de dois a três grandes blocos compactos de seus veteranos, os mais bem apessoados, prontos a dar o golpe final, qual martelo contra os adversários, ou a acudir onde a linha se quebrasse. A cavalaria mantinha-se aos flancos, pouco atrás da primeira linha, evitando ser circundada. Sua táctica predilecta era estender a linha ao máximo, cercando assim o inimigo, que, ao aproximar-se, era recebido por uma chuva de flechas e dardos das bestas da terceira, quarta e quinta linhas. Estas avançavam à frente da infantaria, retornando atrás de seus escudos quando demasiado próximas, sustentadas de perto pelo fogo constante dos onagros, balistas e trabucos, que rompiam as paredes de escudos inimigas, permitindo que fossem cravejadas de projécteis. Quando, por fim, ombro a ombro, as duas primeiras linhas — unificadas ou não — chocavam-se com violência coordenada, mantida por oficiais que se postavam na vanguarda, ao lado e atrás, preservando a coesão, enquanto as linhas de trás faziam chover sobre os coitados dos inimigos granadas incendiárias e plumbatas, que lhes perfuravam elmos e crânios qual faca aquecida na manteiga.
A menor tentativa de intervenção pelos flancos ou de reforços, caso os inimigos lograssem sobrepor em extensão as longas linhas de Vallen, a cavalaria precipitava-se sobre os atacantes. Quando não rompiam a formação de socorro, enviavam os behemotes, ou o próprio Bellignarior os fazia desaparecer num de seus jorros inflamados. 
Se o combate se prolongasse em demasia, ordenava que o centro cedesse, recuando calculadamente; quando menos esperavam, os inimigos viam-se fagocitados num círculo completo das forças de Vallen, que lhes tornavam a vida miserável com projécteis vindos de trás e com os wiverns, cujos cavaleiros, ao passar, lançavam com precisão jarros inflamados a estatelar-se sobre os adversários ou semeavam plumbatas do alto. E, se inda assim os comprimidos não cedessem, era a hora da torrente de chamas ou da reserva brilhar, vindo em bloco compacto e adentrando o círculo qual mão em almofariz, liquidando, esmagada contra paredes de aço, toda e qualquer resistência.
Seguiu assim, queimando e pilhando, deixando atrás de si terra cinzenta, qual limbo eterno. Com sua tropa de cavalaria companheira, muitas vezes precipitava-se sobre cidades e assentamentos, a tudo incendiando, sem muito calcular, nem mesmo permitir seu saque — deviam ser oferendas às chamas! Já era provérbio corrente entre as forças quando seu lorde assim agia, não raro erguendo-se de noite, súbito, e tomando consigo seus cavaleiros, lançava-se sobre o que estivesse mais próximo. O gosto do sangue era, em verdade, excelente!
Os bárbaros e suas cidades caíram, e os elfos deram seu último ponto de resistência próximos à grande floresta ancestral de Bella. Temendo que, num de seus usuais arroubos, ele incendiasse a floresta ancestral — com a qual partilhavam grande parte de sua magia —, reuniram-se os elfos negros e os silvestres para lhe dar combate o mais longe possível da grande floresta e da árvore ancestral. Tensionavam levá-lo a um vasto campo, fazendo conhecida sua posição para dirigi-lo a eles sem demora. Mas o Tigre, numa de suas revoltas nocturnas, acordou suado e de olhos baços, como há muito não lhe ocorria. Lançou-se só, usando unicamente sua cota e correndo por duas vigílias da noite em seu corcel. Fez, ao alvorecer, terrífico, abominável, lastimável e absurdo espectáculo: ardeu, em macabra sinfonia, toda a floresta de Bella, lançando a grande árvore, desde os tempos da criação emanante de graça e magia arcana por eras, a chamas totais e perversas. Pouco puderam as fadas e ninfas fazer para detê-lo, consumidas num cruento fogaréu que durou quinze dias completos até se extinguir. Assim, o Tigre arrancava da terra o terceiro ser ancestral, que tombava toscamente perante ele; nada lhe era páreo, e pouco parecia sagrado. Mesmo os de Vallen se horrorizaram.
Os elfos, desolados e devastados, com suas conexões mágicas cortadas e capacidades brutalmente enfraquecidas, volveram qual enxame enfurecido após ter a colmeia destruída e vieram dar combate a Vallen. Em sua fúria, pareceram lograr quebrar as primeiras linhas, mas, com o avanço dos veteranos e da cavalaria em simultâneo, caíram, fugindo desesperados. Nesta batalha, causaram grandes perdas a Vallen: quatro mil dos vallenianos tombaram, entre eles muitos dos jovens da cavalaria companheira de Bellignarior. Mas isso nada lhe importou, pois uma das companhias de besteiros, na perseguição, ferira um nobre elfo negro, por cuja cabeça seu senhor pusera grande recompensa, e o vira lançar-se a uma pequena faia num barranco perto de um riacho ali próximo.
Ao ser informado de tal: ele acorreu a encontrar o elfo que, em sua armadura dourada, tinha o abdómen e o ombro trespassados, perdendo sangue em profusão enquanto tentava aplicar a si um encantamento de cura. Bellignarior interrompeu-o, decepando-lhe a mão com um golpe seco e, com um sorriso torvo, livrou-se de seu elmo, exibindo o rosto e dentes ao elfo. Este, com as devidas ressalvas pela dor, manteve-se taciturno. Após pressionar o cotoco em seu manto púrpura — que já se tornava negro, encharcado de sangue qual odre de vinho roto —, ouviu, enfim, o rosnar do Tigre, que se apresentava ainda maior, ainda mais rubro ao encará-lo: — Ela te envia saudações. Manda as minhas aos bastardos de teus companheiros, dos quais já me encarreguei, no Sheol.
— Não queres nem saber o porquê? — indagou o elfo, genuinamente surpreso.
— Que importa, se tua cabeça rolar?
— Todo este sangue e nem desejas saber o porquê? Realmente um bruto. Mas te farei saber, “grande” Tigre — ou deveria dizer monstruoso?
Bellignarior estancou-se por um momento, mas, em verdade, pensava em cravar seus dedos transformados naquele pescoço tão convidativo. O elfo, crendo ter logrado seu palco, continuou, arrogante como lhe convinha até o fim: — Irmão por irmão, assim convinha. Tiraste-me um dos meus, e assim importava que eu te tirasse ela. Em verdade, odiei-te por tanto tempo, que passei a considerar-te um companheiro de viagem, me vi alegre quando soube que não havias perecido como o planejado. Queríamos tua cabeça, mas ela morreu em teu lugar. Poético, o fado é deveras justo.
— Não te arrependes, não é mesmo, cretino, de macular tão tenra tez? — bramiu Bellignarior, já perdendo os sentidos.
— Não, mas meus irmãos vingar-me-ão de ti!
Bellignarior já não ouvia, mas o Tigre, sim. Em verdade, aquela parte tão pura da face rubra, que nem mesmo o Tigre, em sua fúria destilada e pura, desprovida de qualquer intento oculto, lograva ciente estar. Com um breve sibilar, a cabeça do elfo tombou; a espada voou limpa, e um filete de sangue lançou-se à terra, enquanto o corpo desabava, esvaziando-se qual saco de areia furado de seu nobre e antiquíssimo sangue. Perecia ali, com quatrocentos anos, Elurien Trunor, descendente dos de Dewloth, sangue real de Lorienyl, quarto de cinco irmãos tão antigos quanto ele, cujo quinto já fora fendido por Bellignarior muitos anos antes da campanha contra os bárbaros, sob o antigo rei. — Que venham! Será delicioso! — bradou o Tigre, encarando os olhos sem vida da cabeça decepada de seu tão odiado inimigo, a qual incendiou, lançando as cinzas ao riacho, ressoando seu eterno mote:
- Pó ao pó, cinzas as cinzas.
Seguiram em sua campanha, pilhando, matando e violando os últimos assentamentos ao norte, até alcançarem as Montanhas de Fogo, território anão no extremo norte do continente, que desembocava no mar. Não tendo por que prosseguir, volveram. Ao atingir Zephyros, dispensou as forças, mantendo apenas parte dos veteranos e das armas, um total de três mil, e seguiu margeando a costa para o oeste, alcançando no outono a cidade de Aquanara. O príncipe ofereceu boas condições, demonstrando sua magnanimidade, vindo ter com todas as honras dignas de um rei ao lado de Bellignarior, acompanhado de sua bela esposa e de seu séquito sem igual de magas. Estas, o príncipe escolhia a dedo, deixando-as sair de seus papéis aos vinte e cinco anos para que se pudessem casar, dando-lhes na aposentadoria pagamento bastante para se manterem pelo resto de seus dias. Mui louvável regente era este príncipe. Contudo, mostrou-se impossibilitado de entregar a Bellignarior o mercador de Nummus, pois era seu chefe do tesouro e jurara dar-lhe acolhida, não podendo assim profaná-la sacralidade da hospitalidade que lhe oferecera. Pediu compreensão àquele que chamava “vossa graça de Vallen”, pois jamais atentaria contra qualquer cavaleiro de Vallen enquanto estivesse sob seu tecto. Tentou distraí-lo com jogos e apresentou-lhe sua esposa, grávida do primeiro filho do príncipe. Isso por pouco comoveu Bellignarior, mas aquilo que o faria dobrar-se a tamanha nobreza já não respirava entre os vivos, e, por mais gentis que fossem os aquanarianos e sua bela cidade — que se erguia em seu castelo de curvas brancas como a areia, forjado com toneladas de magia em marfim, dando vista ao oceano —, não teve efeito. Era uma cena de beleza sem igual: a bela fortaleza elevada, com suas curvas e torres pontiagudas seguindo linhas naturais e simétricas contra o fundo azul e eterno do grande mar. Ah, quanta vida havia naquela cidade! Quão animado era seu mercado, com especiarias, toda sorte de peixes e frutos do mar frescos, tecidos dos mais diversos! A vida ali fervilhava, rodeada dos mais doces aromas e perfumes.
O Tigre ouviu até este ponto e, não encontrando o bastardo de Nummus com o olhar, decidiu-se pelas chamas, ordenando cerco à cidade. Os aquanarianos, tentando ainda a paz, ofereceram-lhe ouro, prata, o que lhe aprouvesse, mas nada tinha valor para ele, salvo a cabeça do mercador, ora tesoureiro, a quem o príncipe, para sua infelicidade, se ligara em sua inocência por juramento de sangue. Explicou, por fim, envergonhado, sua condição a Bellignarior, cuja resposta foi arrasadora: — Então convém que morras com ele.
As máquinas lançaram-se a bombardear a cidade e as muralhas da fortaleza oceânica. A frota de Aquanara tentou socorrer a urbe, mas foi destroçada pelas balistas ao aproximar-se da margem. Capturando alguns barcos, Vallen tentou atacar o porto da fortaleza, mas foi detida por um engenho mágico: uma grande sequência de lentes que captava e direccionava um raio solar contra seus alvos, incendiando as embarcações que ousaram acercar-se. O cerco seguiu-se por todo aquele ano e metade do outro, com o próprio Bellignarior, para deleite de Beatriz, retornando a Vallen. Ela o rondava apaixonada, oferecendo-lhe copos de vinho e hipocrás, enquanto ele, qual felino altivo, continuava a esnobá-la.
Tornou a Aquanara quando ouviu que a cidade enfraquecera, já tentando por mais de uma vez ao dia saídas desesperadas, e que se dera uma evacuação massiva pelo porto, com os wiverns incendiando muitas das barcaças usadas em tal façanha. Ao chegar, Aquanara não passava de sombra do que fora: a muralha da cidade em ruínas, seu outrora fulgurante centro e porto arrasados. A fortaleza oceânica mantinha-se, mas focos de incêndio subiam aqui e ali, e suas ameias já faltavam em vários trechos do muro — um anátema contra tão bela e pacífica cidade. Lançou-se aos portões, pretendendo queimá-los, e em verdade o conseguiu, mas deparou-se com um novo portão de grades, seguido de um maciço de ferro. Levaria bastante tempo para queimá-los; o óleo fervente, atirado dos matacões, ajudava no labor, mas as pedras e flechas não lhe eram agradáveis. Desistiu da ofensiva aos portões, voltando-se a mui pior e crua táctica. Ordenou que se trouxessem, de todos os cantos, com ajuda de Beatriz — que veio mui feliz ao seu senhor, enamorada pela ideia de vê-lo enfim em campo de batalha —, carroças e mais carroças de erva diabólica seca. Em cruel cinismo, deixou que os defensores, em seus esforços, incendiassem a erva que lhes cobria o fosso, não se abstendo de aumentar ele mesmo o fogo. Uma horrenda fumarada venenosa, que fazia os pulmões explodirem e os que a inalavam sangrarem por boca, nariz e olhos, lançou-se com cruel eficiência pelas seteiras, janelas e frestas das portas, matando em golfadas de sangue os aquanarianos na fortaleza. Alguns poucos magos e o príncipe sobreviveram, refugiando-se num pátio onde o vento soprava contrário, levando a fumaça ao longe, mas a esposa e o futuro principezinho em seu ventre pereceram em horrendo sacrilégio, brutal e enojante.
Enfurecido e com lágrimas nos olhos, o príncipe lançou seus magos num ataque pela ponte, derrubando, em surpresa, os primeiros atacantes que encontraram pelo caminho. Mas, ao romperem a primeira linha de circunvalação, foram cravejados pelos arqueiros, que, numa única salva, os abateram, limpando o caminho. Restaram apenas o príncipe, com uma flecha na coxa, e uma maga, sua amiga de infância e irmã colaça, ígnea e de cura, uma ruiva de pele alaranjada muito falada, Rayne do Fogo, como a chamavam. Em seu belo vestido negro, fendido aos lados, expondo a coxa laranja definida, lançava-se com seu manto vermelho, sempre viva e irradiante, a brincar e gracejar em Aquanara; não havia companhia mais desejada que a da bela Rayne. O príncipe, desolado, sem razão para viver e enfurecido, clamou em alta voz, sob a mira das bestas e arcos de Vallen, que, contemplando a cena, se mantiveram quedos: — BELLIGNARIOR!
Pouco depois, o cavaleiro negro surgiu, encarando os dois olhares odiosos que o fitavam no meio da ponte da fortaleza, aos olhos de todas as tropas e de Beatriz, que acompanhava de perto. — Tiraste-me tudo! E porquê? — gritou o príncipe. Era triste ver sua bela forma, longa e alva como neve, em tão mal estado, reclinado, com sangue a sair-lhe da coxa, os cabelos loiros cobertos de fuligem e desgrenhados, os olhos azulados, vermelhos de dor e ódio.
— Sabes o porquê, nobre sire de Aquanara! — rugiu o Tigre, tácito.
— Que opção tive eu? — lamentou com lagrimas o príncipe.
— Não devias ter-te aliado ao iníquo em teu sangue, tolo! — devolveu Bellignarior.
— Enfrenta-me, covarde! — urrou o príncipe.
Bellignarior permitiu que Rayne o curasse do ferimento na perna e consentiu em deixá-la enfrentá-lo antes do príncipe, coisa que este muito protestou, bradando aos olhos de todos que, se ainda havia algo de bom no coração — ou onde quer que fosse no peito — do líder de Vallen e nos vallenianos, Rayne deveria ser poupada. Quanto a ele, não tinha outro desejo senão matar e morrer. Assim, baixámo-nos das torres a contemplar tão triste feito.
A bela Rayne iniciou, conjurando um grande tufão de chamas, consumindo sua mana e espírito com ele, e disparou-o, lançando um último sorriso lacrimejante a seu irmão colaço, que se desesperou e clamou em grande dor, não podendo alcançá-la, pois ela já ia, envolta em chamas, contra Bellignarior. Este a aguardava impassível. Lançando-se sobre o cavaleiro negro, envolveu-o num redemoinho de fogo e, com alguns golpes contra ele — que aparou sem dificuldade com os braços —, iniciou uma dança macabra e derradeira, dizendo: — Eu sou Rayne do Fogo, alta maga de Aquanara! Pelo sangue de meus irmãos, arda meu corpo, e que os poderes do fogo te consumam!
Disparou uma forte rajada de chamas que cobriu Bellignarior completamente em sua torrente, aos olhos dos de Vallen e da mui aflita d’Hirson, que a tudo assistia. Sabiam que seu senhor não cairia àquilo — inda mais ao fogo, que lhe era tão próprio —, mas quem sabia? Erguê-lo-ia de chamas que pareciam rivalizar com as suas, mas de lume diverso? Aquele feitiço, que lhes parecia tão familiar, era um encanto autosacrificial, onde o mago dá tudo de si — carne, espírito e alma — por um último e poderosíssimo ataque ou protecção, elevado pela nobreza ou intensidade dos sentimentos. Rayne ardeu como nunca outro mortal fizera até então, consumindo as paliçadas e fazendo recuar as tropas de Vallen. A própria Beatriz teve de proteger-se.
E assim Rayne do Fogo, alta maga de Aquanara, teve seu fim, perfazendo-se estátua de cinzas belíssima até o derradeiro instante, levada pelo vento, restando apenas as pedras calcinadas à sua frente e por onde pisara. Mas aquilo nada era para o Tigre; em verdade, usava chamas mais poderosas em seus ataques mais triviais. Para horror do príncipe e júbilo e temor de Vallen, o cavaleiro negro, zunindo em sua armadura, com ondas de calor subindo de si e raios mágicos alaranjados a lançarem-se à sua volta, ergueu-se do meio das chamas qual dragão em sua devastação, qual espectro de cataclismo, qual ceifeiro etéreo. O príncipe atacou-o, mas, ao atingi-lo com sua espada, esta quebrou-se em sua têmpera perante tamanha temperatura. Apenas de encará-lo, morreu cozido, em abominável e infinita dor, um agravo a todas as criações abaixo e acima do firmamento por tamanha vileza. Recolhemos sua alma com excelso cuidado, enquanto seu corpo já se confundia com a negridão carvoenta da ponte. Bellignarior adentrou a fortaleza, encontrando seu burguês, que, ao sentir os efeitos do veneno, trespassara-se o pescoço com uma adaga. Queimou-lhe o corpo e, incendiando a fortaleza oceânica, saiu, tornando para Vallen.
Após Aquanara, sentia-se exausto e indisposto, e com razão se encontrava em tal dor. Pesava-lhe, ainda que ao fundo da consciência — salvo se fosse o mal encarnado em sua mais pura essência —, manter-se indiferente. Ora, não era este o caso do Tigre: mesmo sem seu coração, não era força de todo maligna, embora se houvesse transviado. Inda seguia ao alto desígnio, mas seu fado já lhe cobraria todo o sangue inocente que se apinhava sobre ele. E aqui seria mais do que já era, pela ausência de sua meia-face, dilacerado. Dividiu as tropas em quatro, enviando seus comandantes — daqueles que o seguiram desde jovens — ao oeste e ao leste. O fogo do Tigre parecia acompanhá-los, pois foram vitoriosos em seus intentos, com os viscondes caindo e sendo trazidos a Vallen, onde foram exibidos em triunfo e consumidos por Bellignarior à frente do já vasto mausoléu de Alfionora. Este, ele mandara aparamentar cada vez mais a cada vitória, a cada assassino morto, com novo afresco, ouro ou uma torre acrescida. Faltava apenas um, que lhe escapava e o assombrava, mesmo estando tão perto, vendo-o todos os dias, o vilão lhe fugia.
Mas não haveria de esconder-se por muito tempo, pois certo dia, conversando com seu sire sobre a noite fatídica, o mordomo cometeu o deslize de informar com detalhes o caminho que os bandidos haviam tomado. Bellignarior estranhou a princípio tamanha precisão, pois o velho recordava-se de um vaso que estava numa das escadas usadas na fuga, deixado ali e retirado no dia seguinte. Nem ele mesmo sabia qual fora o caminho dos assassinos, pois as portas estavam trancadas após sua evasão. Imaginava ser obra da criadagem que participara — as cozinheiras podiam ajudar no térreo e nos armazéns, o guarda nas muralhas —, mas dentro do castelo era outra conversa. Indagou ao mordomo se algo mais se lembrava e por que recomendara que fosse dormir mais cedo naquela noite. O velho, porém, percebendo o erro, escusou-se, dizendo que nada mais recordava por sua velhice. Mui desconfiado, Bellignarior pediu a Beatriz que vigiasse o chanceler, coisa que ela fez com o maior prazer, enfim sendo “rainha” e senhora só, sem aquele velho mesquinho a contradizê-la.
A vigília deu frutos quando, naquela mesma noite, o ancião saiu pela muralha e atirou algo ao fosso. Os espiões de d’Hirson recuperaram o que fora lançado: um antigo molho de chaves do castelo que, ao ser testado, revelou abrir todas as portas da rota que o mordomo mencionara. Bellignarior enfureceu-se, mas conteve-se por um momento. Esperando ficar a sós com o chanceler, indagou-o com voz grave: — Maltravers, há quanto tempo me serves?
— Desde que nasceste, sire.
— Em verdade, e antes disso, a meu pai?
— Desde que se tornou conde de Vallen — retornou o velho.
Bellignarior, tirando de uma gaveta um objecto cruciforme envolto num pano, fez o mordomo ser tomado por um arrepio que lhe gelou a espinha, deixando-o paralisado. Eis que descemos ao seu lado e o segurámos, pesando nossas mãos nos ombros do vilão. Bellignarior continuou, enquanto o desvelava: — Que te levou a tamanho sacrilégio? E que falta de tino foi continuar em minha corte?
— Senhor, não sei do que falais.
— Não o sabes? Muito bem, Maltravers — ou devo chamar-te sombra negra que me povoa os sonhos? Podridão maldita, escuridão repulsiva, sob meu tecto, após eu, após nós, tanto te confiarmos, servo vil!
— Senhor, não é o que ides pensando!
— Que vou eu pensando? Que atiraste a chave ao fosso ontem por descuido? Chave esta que abre a rota, até então-me desconhecida a mim e a todos, que usaram para cravar as mãos nela? Bem entendo agora por que desejavas que eu fosse dormir naquela noite, cretino!
E assim, abraçando o velho mordomo, cravou-lhe no pescoço a pequena adaga em agulha prateada, ainda com o sangue seco de Alfionora. O ancião, olhando nos olhos daquele que traíra, pagou seus pecados, engasgando-se no próprio sangue pútrido, entregue às mãos da morte e lançado ao Sheol assim que caiu ao chão. Bellignarior soltou um rugido que perfazia o daquela noite em que ela se fora, ou quando queimara os portões, ou quando ela caíra na igreja, fazendo tremer o castelo. Relembrava, em estranho paradoxo, tempos mais doces aos moradores de Vallen.
Trancava-se em seu escritório, quedando-se decaído sobre sua mesa, qual gato sobre as patas. Beatriz, vendo-lhe a fraqueza e ciente de suas causas — pois ela também fora abalada pela queda de Aquanara —, viu sua oportunidade. Certo entardecer, ao trazer-lhe o hipocrás, não parou por aí. Com o busto elevado num vestido que lhe avantajava os atributos, começou a deslizar-lhe os dedos pelos braços. Bellignarior, já acostumado às suas estranhas manias, ignorou-a como de costume; em momentos, pô-la-ia para fora, e suas excentricidades cessariam de incomodá-lo. Mas ela não se deteve: estava mais perfumada que de costume, envolveu-o por trás, reclinando-se sobre ele, pressionando-se contra suas costas. Permitiu-se sentir aquelas enormes e musculosas costas, com as cerdas a picarem-lhe em mais de um ponto. Ah, como adorava aquilo! Afundou o delicado nariz no cabelo dele, que cheirava a chamas. Como era quente ele, em todo o seu ser!
— Beatriz! — censurou-a ele, num rosnado baixo.
Ela, silenciando-o com um dedo sobre os lábios, deslizou à frente dele e, envolvendo-o com os braços, tentou recolhê-lo a repousar sobre seu busto. Era quente, em verdade, a ponto de incomodar, mas que importava? Enfim o tinha em seus braços. Já sonhava em como aquela vasta massa ardente se pressionaria sobre si, só para ela. Mas o Tigre não se importava com tais coisas. Achava-a estranha, quase cômica a princípio, mas estranhou-se ao ver-se, em blasfémia contra si mesmo, buscando o conforto que só encontrara nos braços de uma. Enojou-se, horripilou-se ante tal sacrilégio e pôs-se a arder. Beatriz, mal interpretando, julgou que ele se animava por ela. Oh, quão feliz foi a pobre Beatriz por aqueles instantes! Já se preparava a oferecer-lhe as amarras do corset. Mas ele, em verdade, abominava-a. Conscientizara-se das intenções dela e ora detestava aqueles braços que tentavam enredá-lo, aquele falso ídolo blasfemo que ousava suplantar-lhe o coração.
Atirou-a, enojado e enfurecido consigo, como se faria a um sapo. Seus dentes brilharam proeminentes, e seus olhos arderam. — SUMA DE MINHA VISTA, ABOMINAÇÃO! — bradou.
A tão leal, tão apaixonada Beatriz, sem entender, fitava-o com seus grandes olhos negros, que se desvelavam por trás de seus longos cílios. Estes, que a tantos brilhavam e se apagavam ao seu bel-prazer, sumindo atrás daquelas belas pestanas, ora apenas reflectiam as chamas que via, do chão onde caíra, o coração partido. Demorando-se, quase se viu envolta pelas chamas, não fosse um dos jovens barões, que estava na sala ao lado, acorrer a tirá-la dali. Sua última visão foi o Tigre, envolto em chamas, a boca aberta, enorme, bufando pela porta, diminuindo cada vez mais pelo corredor. Oh, quanto o amara! Dali em diante, a bela Beatriz voltou ao lado de sua senhora, e ambas, ao se encontrarem, caíram nos braços uma da outra em lágrimas. Haviam tentado usar o Tigre, mas, no fim, fora ele quem as usara e descartara. E quem lhes garantia que, em sua fúria, não as despedaçaria?
Sem rumo, o Tigre se encontrava, mas inda convinha que ardesse. Seguiu, pois, dedicando-se à única coisa que lhe restava: a guerra, guerra eterna contra tudo e todos que lhe cruzassem o caminho. Cavalgava pelos campos qual aparição macabra, seguido de suas hostes, e a tudo tomava e consumia. Seguiu nesse ciclo por dois anos, até que nada lhe restou a devorar. Volveu-se aos “traidores”: ao menor sinal de descontentamento, caía sobre os que julgava inimigos, mas apenas buscava saciar sua infindável sede de sangue. Sabia que, no fundo, quando lhe acabasse o combustível, consumir-se-ia, apagando-se. Assim, lançou Zephyros em caos e pavor, combatendo muitos de seus antigos companheiros e prevalecendo. Com muito esforço, Martor logrou permanecer intocada, mas não sem ter suas belíssimas vinhas tocadas pelo fogo. A condessa olhava tudo do alto de suas muralhas, com Beatriz a circundá-la, enquanto pranteavam.
Nesse contexto, aos trinta e seis anos do Tigre, Bellignarior via-se combatendo uns pobres labregos que se haviam voltado contra ele, pois pretendia levar-lhes os filhos para seu exército em alguma de suas guerras infindáveis. Cavalgando próximo à fronteira de Argonia, viu ao longe, no campo onde estava, um pequeno grupo que seguia pela estrada. Chamou-lhe não pouca atenção, atraindo-o quase por instinto. Esporeando o cavalo, foi ter com eles.
Aproximou-se, pois, dos viajantes aquela sombra negra fumegante, em sua besta metálica igualmente negra, de longos penachos vermelhos, lançando terrífica sombra sobre o grupo. Compunha-se o curioso ajuntamento de um bardo em seus trajes pomposos de púrpura escura, um paladino, um arqueiro elfo e uma que aparentava ser maga de luminarya. Mas quem verdadeiramente lhe capturou a atenção foi a freira, oculta num grosso manto azul-escuro, como o céu nocturno, que a cobria dos pés à cabeça. Apenas o pescoço expunha a gola alta de um vestido do mesmo tecido, e o peitilho de uma couraça prateada marcava-se sob o pano logo abaixo.
Em verdade, uma figura fascinante por si, inda mais entre tão eclético grupo, que o encarava desafiador. O paladino já sacara sua lâmina, mas a encapuzada era quem o atraía: emanava de seu pequeno e delicado rosto — onde apenas o queixo e a ponta do nariz se mostravam — uma luminosidade tão querida, tão conhecida, que jamais pensara rever. Ah, era a luz de sua amada metade! Irradiava aquela luz própria ao seu coração, à sua meia-alma. Encarou-a de cima de sua montaria, extasiado, ignorando o grupo. Quando a maga começou a conjurar um orbe de glacius, ele, com um sopro, apagou-o, queimando-a. Saltou do cavalo, fazendo tremer o chão ao seu impacto, e caminhou na direcção da moça, que se mostrava desconfiada, mas corajosa. Tomou-lhe o queixo entre o polegar e o indicador, encarando aqueles grandes olhos azuis, quais safiras. Não, não era aquela a quem buscava. Estremeceu em desilusão, mas claro fora tolo em pensar tal absurdo. Não velara ele o corpo daquela que julgara reencontrar? Salvo se um fantasma ou metamorfo macabro tentasse passar-se por ela, jamais a reveria.
Ainda assim, sentia-se bem ao seu lado; parecia haver paz. Mas que ardesse aquela luz mentirosa, aquela falsa cópia, aquele luzeiro enganoso! Suas vísceras revolviam-se; não sabia o que sentia, mas precisava extinguir a fonte daquela confusão. Preparava-se para sacar a espada, quando uma voz, mui mais forte que seus rugidos, qual relâmpago que lhe caía ao lado dos ouvidos, o impactou, seguida de um fortíssimo brilho, congénere àquele que lhe iluminara todos os anos de alegria, cegando-o por instantes: — Não!
Trovejou a voz, e os céus se abriram, pesando como lanças na abertura luminosa entre as nuvens. A fumaça dissipou-se, e seu calor silenciou-se. O Tigre fora atirado ao chão, ajoelhado, subjugado pela primeira vez. Mortificado, quedou Bellignarior, perscrutando enfim o maravilhoso vulto luminoso que estava ao lado da jovem — tão mais belo, tão mais puro, tão mais forte, indomável e poderoso, muito mais perfeito e antigo que a luz que até então lhe fora o ápice de tudo. Não, não era como ela; era mui mais elevado. Fazia-se conhecer nosso irmão, e via um pequeno pedaço da verdadeira luz. Sua revolta paralisou-se, e apenas pôde admirar, derrotado, que havia uma luz mui mais excelsa que aquela a que adorava, e algo mui mais forte que ele. — Volta-te a outro intento! Importa que devores muita carne ainda, mas não hás-de tocá-la, pois assim foi ordenado!
Ah, poder verdadeiro, pureza em sua forma mais perfeita! Ficou assim, atónito, naquela estrada, até que a noite se pôs sobre ele, e já não encontrou nem a luz, nem a donzela, nem sua trupe. Volveu ao castelo, maravilhado e pensativo. Prosseguiu, pois, o grande Tigre por mais dois longos anos, mas desta vez guiado
por nós, abrindo caminho a ela. Assim, o Tigre foi pela leoa, antes de consumir-se em chamas ao enfrentar a horda de mortos do feiticeiro Margonio. Venceu-os, sem dúvida, mas extinguiu-se, caindo enfim. Com um último suspiro, ajoelhado sob sua espada, pronunciou: — Tudo por ti, minha bela, bela irmã. Espero ver-te em breve.

           // =================================================================
        // FUNÇÃO: divide o texto em páginas com base no número de palavras
        // =================================================================
        function dividirTextoEmPaginas(texto, palavrasPorPagina) {
            function contarPalavras(str) {
                return str.split(/\s+/).filter(Boolean).length;
            }
        
            // Divide por linhas simples e agrupa linhas consecutivas em blocos (parágrafos)
            const linhas = texto.split(/\n/);
            const blocos = [];
            let blocoAtual = [];
        
            for (let linha of linhas) {
                linha = linha.trim();
                if (linha === '') {
                    if (blocoAtual.length > 0) {
                        blocos.push(blocoAtual.join(' '));
                        blocoAtual = [];
                    }
                } else {
                    blocoAtual.push(linha);
                }
            }
            if (blocoAtual.length > 0) blocos.push(blocoAtual.join(' '));
        
            // Agrupa blocos em páginas respeitando o limite de palavras
            const paginas = [];
            let paginaAtual = [];
            let contadorPalavras = 0;
        
            for (let bloco of blocos) {
                if (!bloco.trim()) continue;
                const palavrasBloco = contarPalavras(bloco);
        
                if (contadorPalavras + palavrasBloco > palavrasPorPagina && paginaAtual.length > 0) {
                    paginas.push(paginaAtual.map(b => `<p>${b}</p>`).join(''));
                    paginaAtual = [bloco];
                    contadorPalavras = palavrasBloco;
                } else {
                    paginaAtual.push(bloco);
                    contadorPalavras += palavrasBloco;
                }
            }
        
            if (paginaAtual.length > 0) {
                paginas.push(paginaAtual.map(b => `<p>${b}</p>`).join(''));
            }
        
            if (paginas.length === 0) paginas.push('<p>Página vazia</p>');
            return paginas;
        }

        // ----- Gerar páginas a partir do texto original -----

    // =================================================================
    // Lógica completa do livro (navegação, zoom, modos, eventos)
    // =================================================================
    let indiceEsquerda = 0;
    let indiceUnico = 0;
    let zoomNivel = 1.0;
    const ZOOM_MIN = 0.5;
    const ZOOM_MAX = 3.0;
    const PASSO_ZOOM = 0.2;

    let modoAtual = 'livro';

    // ... (todo o restante do código até o final)
     // Elementos DOM
    const livroEl = document.getElementById('livro');
    const toggleBtn = document.getElementById('toggleLivroBtn');
    const visualizacao = document.getElementById('visualizacao');
    const paginaEsq = document.getElementById('paginaEsquerda');
    const paginaDir = document.getElementById('paginaDireita');
    const paginaUnica = document.getElementById('paginaUnica');
    const indicador = document.getElementById('indicador');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const toggleZoomBtn = document.getElementById('toggleZoomBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const htmlEditor = document.getElementById('htmlEditor');
    const updateBtn = document.getElementById('updateBtn');
    const addBtn = document.getElementById('addBtn');
    const removeBtn = document.getElementById('removeBtn');

    function renderizarModoLivro() {
        paginaEsq.innerHTML = paginas[indiceEsquerda] || '<p>Página vazia</p>';
        if (indiceEsquerda + 1 < paginas.length) {
            paginaDir.innerHTML = paginas[indiceEsquerda + 1];
        } else {
            paginaDir.innerHTML = '<p style="color:#775533;">✧ Fim das histórias ✧</p>';
        }
        indicador.textContent = `Páginas ${indiceEsquerda+1} e ${Math.min(indiceEsquerda+2, paginas.length)} de ${paginas.length}`;
    }

    function renderizarModoZoom() {
        paginaUnica.innerHTML = paginas[indiceUnico] || '<p>Página vazia</p>';
        aplicarZoom(zoomNivel);
        indicador.textContent = `Página ${indiceUnico+1} (zoom) de ${paginas.length}`;
    }

    function aplicarZoom(novoZoom) {
        zoomNivel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, novoZoom));
        paginaUnica.style.transform = `scale(${zoomNivel})`;
    }

    function renderizarTudo() {
        if (modoAtual === 'livro') {
            renderizarModoLivro();
            htmlEditor.value = paginas[indiceEsquerda] || '';
        } else {
            renderizarModoZoom();
            htmlEditor.value = paginas[indiceUnico] || '';
        }
    }

    function ativarModo(modo) {
        modoAtual = modo;
        if (modo === 'livro') {
            visualizacao.classList.remove('modo-zoom-ativo');
            visualizacao.classList.add('modo-livro-ativo');
            toggleZoomBtn.innerHTML = '<i class="fas fa-search"></i> Aproximar';
            indiceUnico = indiceEsquerda;
            renderizarModoLivro();
            htmlEditor.value = paginas[indiceEsquerda] || '';
        } else {
            visualizacao.classList.remove('modo-livro-ativo');
            visualizacao.classList.add('modo-zoom-ativo');
            toggleZoomBtn.innerHTML = '<i class="fas fa-book-open"></i> Visão dupla';
            renderizarModoZoom();
            htmlEditor.value = paginas[indiceUnico] || '';
        }
    }

    function anterior() {
        if (modoAtual === 'livro') {
            if (indiceEsquerda >= 2) {
                indiceEsquerda -= 2;
            } else {
                alert('Já estás no início do livro.');
                return;
            }
            renderizarModoLivro();
            htmlEditor.value = paginas[indiceEsquerda] || '';
        } else {
            if (indiceUnico > 0) {
                indiceUnico--;
            } else {
                alert('Primeira página.');
                return;
            }
            renderizarModoZoom();
            htmlEditor.value = paginas[indiceUnico] || '';
        }
    }

    function proximo() {
        if (modoAtual === 'livro') {
            if (indiceEsquerda + 2 < paginas.length) {
                indiceEsquerda += 2;
            } else {
                alert('Estás nas últimas folhas.');
                return;
            }
            renderizarModoLivro();
            htmlEditor.value = paginas[indiceEsquerda] || '';
        } else {
            if (indiceUnico + 1 < paginas.length) {
                indiceUnico++;
            } else {
                alert('Última página.');
                return;
            }
            renderizarModoZoom();
            htmlEditor.value = paginas[indiceUnico] || '';
        }
    }

    prevBtn.addEventListener('click', anterior);
    nextBtn.addEventListener('click', proximo);

    toggleZoomBtn.addEventListener('click', () => {
        ativarModo(modoAtual === 'livro' ? 'zoom' : 'livro');
    });

    zoomInBtn.addEventListener('click', () => {
        if (modoAtual === 'zoom') aplicarZoom(zoomNivel + PASSO_ZOOM);
        else alert('Entre no modo aproximado primeiro.');
    });

    zoomOutBtn.addEventListener('click', () => {
        if (modoAtual === 'zoom') aplicarZoom(zoomNivel - PASSO_ZOOM);
        else alert('Entre no modo aproximado primeiro.');
    });

    zoomResetBtn.addEventListener('click', () => {
        if (modoAtual === 'zoom') aplicarZoom(1.0);
        else alert('Entre no modo aproximado primeiro.');
    });

    updateBtn.addEventListener('click', () => {
        const novoHTML = htmlEditor.value.trim() || '<p>Página em branco</p>';
        if (modoAtual === 'livro') {
            paginas[indiceEsquerda] = novoHTML;
            renderizarModoLivro();
        } else {
            paginas[indiceUnico] = novoHTML;
            renderizarModoZoom();
        }
    });

    addBtn.addEventListener('click', () => {
        const novoConteudo = htmlEditor.value.trim() || '<h2>Nova história</h2><p>Escreva aqui...</p>';
        if (modoAtual === 'livro') {
            paginas.splice(indiceEsquerda + 1, 0, novoConteudo);
            renderizarModoLivro();
        } else {
            paginas.splice(indiceUnico + 1, 0, novoConteudo);
            indiceUnico++;
            renderizarModoZoom();
            htmlEditor.value = paginas[indiceUnico] || '';
        }
    });

    removeBtn.addEventListener('click', () => {
        if (paginas.length <= 1) {
            alert('O livro precisa de pelo menos uma página.');
            return;
        }
        if (confirm('Remover esta página para sempre?')) {
            if (modoAtual === 'livro') {
                paginas.splice(indiceEsquerda, 1);
                if (indiceEsquerda >= paginas.length) indiceEsquerda = paginas.length - 1;
                if (indiceEsquerda % 2 !== 0) indiceEsquerda--; // manter índice par
                if (indiceEsquerda < 0) indiceEsquerda = 0;
                renderizarModoLivro();
                htmlEditor.value = paginas[indiceEsquerda] || '';
            } else {
                paginas.splice(indiceUnico, 1);
                if (indiceUnico >= paginas.length) indiceUnico = paginas.length - 1;
                renderizarModoZoom();
                htmlEditor.value = paginas[indiceUnico] || '';
            }
        }
    });

    function toggleLivro() {
        if (livroEl.classList.contains('fechado')) {
            livroEl.classList.remove('fechado');
            livroEl.classList.add('aberto');
            toggleBtn.innerHTML = '<i class="fas fa-book-close"></i> Fechar Livro';
        } else {
            livroEl.classList.remove('aberto');
            livroEl.classList.add('fechado');
            toggleBtn.innerHTML = '<i class="fas fa-book-open"></i> Abrir Livro';
        }
    }

    toggleBtn.addEventListener('click', toggleLivro);
    document.querySelector('.capa').addEventListener('click', (e) => {
        if (livroEl.classList.contains('fechado')) toggleLivro();
    });

    // Inicialização
    renderizarTudo();
})();
</script>
